<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Western Washington Transit Explorer (Beta version)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet-polylineoffset@1.1.1/leaflet.polylineoffset.min.js"></script>
<style>
  :root {
    --bg:#080c14; --panel:#0e1520; --panel2:#141d2e;
    --border:rgba(100,160,255,0.12);
    --accent:#4fc3f7; --green:#43e09b; --orange:#ff9f43;
    --pink:#f368e0; --yellow:#ffd32a; --red:#ff6b6b; --purple:#a55eea;
    --text:#dce8f5; --muted:#5a7a9a;
    --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{font-family:var(--sans);background:var(--bg);color:var(--text);display:flex;flex-direction:column}

  /* Header */
  header{display:flex;align-items:center;gap:14px;padding:0 18px;height:52px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;z-index:1000}
  .wordmark{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);white-space:nowrap}
  .divider{width:1px;height:20px;background:var(--border);flex-shrink:0}
  .feed-label{font-family:var(--mono);font-size:10px;color:var(--muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .status-pill{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;background:rgba(67,224,155,.1);border:1px solid rgba(67,224,155,.25);font-family:var(--mono);font-size:10px;color:var(--green);flex-shrink:0;transition:all .3s}
  .status-pill.loading{background:rgba(79,195,247,.1);border-color:rgba(79,195,247,.25);color:var(--accent)}
  .status-pill.error{background:rgba(255,107,107,.1);border-color:rgba(255,107,107,.25);color:var(--red)}
  .dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  /* Layout */
  .main{display:flex;flex:1;overflow:hidden}

  /* Sidebar */
  .sidebar{width:290px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;z-index:500}
  .sidebar-section{padding:14px 16px;border-bottom:1px solid var(--border)}
  .section-label{font-family:var(--mono);font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}

  /* Map */
  #map{flex:1;background:var(--bg);height:100%;width:100%}

  /* Loader */
  .loader{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(8,12,20,.88);z-index:2000;flex-direction:column;gap:14px}
  .loader.hidden{display:none}
  .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loader-text{font-family:var(--mono);font-size:11px;color:var(--muted);max-width:340px;text-align:center;line-height:1.6}
  .loader-sub{font-family:var(--mono);font-size:9px;color:rgba(90,122,154,.5);max-width:360px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .progress-bar{width:220px;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
  .progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s;width:0%}

  /* Info panel */
  .info-panel{position:absolute;bottom:20px;right:16px;width:290px;background:var(--panel);border:1px solid var(--border);border-radius:10px;z-index:1000;display:none;max-height:65vh;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.6);flex-direction:column}
  .info-panel.visible{display:flex}
  .info-header{
    padding:8px 12px;
    padding-right:32px; /* space for close button */
    border-bottom:1px solid var(--border);
    position:relative;
    flex-shrink:0;
  }
  .info-header h3{
    font-family:var(--mono);font-size:10px;color:var(--accent);
    letter-spacing:.05em;text-align:left;
    overflow:hidden;text-overflow:ellipsis;
    line-height:1.4;
    max-height:2.8em; /* ~2 lines */
  }
  .close-info,.back-btn{
    background:none;border:none;color:var(--muted);
    cursor:pointer;font-size:14px;padding:6px;
    display:flex;align-items:center;justify-content:center;
    position:absolute;
    top:50%;
    transform:translateY(-50%);
  }
  .back-btn{display:none;left:4px}  /* hidden on desktop */
  .close-info{right:4px}
  .close-info:hover,.back-btn:hover{color:var(--text)}
  .info-body{overflow-y:auto;padding:10px 14px}
  .info-section-title{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:10px 0 6px;padding-bottom:4px;border-bottom:1px solid var(--border)}
  .info-section-title:first-child{margin-top:0}
  .info-row{display:flex;gap:8px;padding:4px 0;border-bottom:1px solid rgba(100,160,255,.04);font-size:11px}
  .info-row:last-child{border-bottom:none}
  .info-key{color:var(--muted);width:105px;flex-shrink:0;font-size:10px;word-break:break-word}
  .info-val{color:var(--text);word-break:break-word}
  .sl-bar{display:flex;gap:3px;margin:4px 0}
  .sl-bar-seg{flex:1;border-radius:4px;padding:5px 4px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:default;position:relative}
  .sl-bar-period{font-family:var(--mono);font-size:9px;font-weight:600;opacity:0.75;letter-spacing:.05em}
  .sl-bar-label{font-size:9px;text-align:center;line-height:1.2;display:none}
  .sl-bar-seg:hover .sl-bar-label{display:block}
  /* Transit route cards */
  .transit-cards{display:flex;flex-direction:column;gap:6px;margin-top:2px}
  .transit-group-label{display:flex;align-items:center;gap:6px;margin:10px 0 5px}
  .transit-group-label:first-child{margin-top:2px}
  .tgl-pill{font-family:var(--mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase;padding:2px 7px;border-radius:3px;font-weight:600}
  .tgl-line{flex:1;height:1px;background:var(--border)}
  .transit-card{background:var(--panel2);border:1px solid var(--border);border-radius:6px;padding:8px 10px}
  .route-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-family:var(--mono);font-size:11px;font-weight:600;line-height:1.5;cursor:default;white-space:nowrap}
  #agency-tooltip{position:fixed;background:#1a2538;color:#dce8f5;font-family:var(--sans);font-size:10px;font-weight:400;padding:3px 8px;border-radius:4px;white-space:nowrap;border:1px solid rgba(100,160,255,0.2);pointer-events:none;z-index:99999;display:none;}

  /* Legend */
  .legend-item{display:flex;align-items:center;gap:10px;padding:7px 16px;font-size:12px;}
  .legend-swatch{width:24px;height:4px;border-radius:2px;flex-shrink:0;}
  .legend-label{color:var(--text);flex:1;line-height:1.3;}
  .legend-count{font-family:var(--mono);font-size:10px;color:var(--muted);flex-shrink:0;}

  /* Mode + period switchers */
  .mode-switcher{display:flex;flex-direction:column;gap:4px;margin-top:8px;}
  .period-switcher{display:flex;gap:4px;margin-top:8px;}
  .mode-btn,.period-btn{flex:1;padding:6px 8px;border-radius:4px;border:1px solid var(--border);background:var(--panel2);color:var(--muted);font-family:var(--mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .15s;text-align:left;}
  .mode-btn:hover,.period-btn:hover{color:var(--text);border-color:rgba(100,160,255,0.3);}
  .mode-btn.active,.period-btn.active{background:rgba(79,195,247,.15);border-color:rgba(79,195,247,.4);color:var(--accent);}

  /* Leaflet overrides */
  .leaflet-popup-content-wrapper{background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:8px;font-family:var(--sans);font-size:12px}
  .leaflet-popup-tip{background:var(--panel)}
  .leaflet-control-zoom a{background:var(--panel)!important;color:var(--text)!important;border-color:var(--border)!important}
  .leaflet-control-zoom a:hover{background:var(--panel2)!important}
  .leaflet-control-attribution{display:none}

  /* ── Resizer ─────────────────────────────────────────────────────────────── */
  #resizer{
    flex-shrink:0;
    background:var(--panel);
    border:none;
    position:relative;
    z-index:600;
    /* Desktop: vertical strip between sidebar and map */
    width:8px;
    cursor:col-resize;
    border-left:1px solid var(--border);
    border-right:1px solid var(--border);
    transition:background .15s;
  }
  #resizer:hover, #resizer.dragging{ background:rgba(79,195,247,.15); }
  /* Grip dots centered in the handle */
  #resizer::before{
    content:'';
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    width:3px; height:24px;
    background:radial-gradient(circle, var(--muted) 1.5px, transparent 1.5px);
    background-size:3px 6px;
    opacity:.6;
  }

  /* ── Mobile: bottom bar layout ─────────────────────────────────────────── */
  @media (max-width: 768px) {
    .main{flex-direction:column}
    .sidebar{width:100%;height:280px;flex-shrink:0;border-right:none;border-top:1px solid var(--border);order:2}
    #map{order:1}
    /* On mobile, info panel replaces the sidebar rather than floating above it */
    .info-panel{
      position:static;           /* pulled out of absolute flow */
      width:100%;
      height:280px;
      max-height:280px;
      border-radius:0;
      border-left:none;border-right:none;border-bottom:none;
      box-shadow:none;
      order:2;                   /* sits in the same slot as the sidebar */
      display:none;              /* hidden until .visible */
      flex-shrink:0;
    }
    .info-panel.visible{display:flex}
    /* Hide sidebar when info panel is shown on mobile */
    .sidebar.hidden-mobile{display:none}
    /* Back button visible only on mobile — desktop keeps it hidden */
    .back-btn{display:flex;visibility:visible;left:8px;right:auto}
    /* Adjust title padding on mobile to accommodate back button on left */
    .info-header h3{padding-left:24px;padding-right:24px}

    /* Legend: two-column grid so all items are visible without scrolling.
       Each column is at least 140px wide; the grid fills available width.
       Items stay compact — reduced padding and font to fit more per row. */
    #legendList{
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(140px, 1fr));
      overflow-y:auto;
      padding:4px 8px;
    }
    .legend-item{padding:5px 8px;font-size:11px;align-items:center}
    .legend-swatch{width:20px;flex-shrink:0}

    /* Resizer: horizontal strip between map and sidebar on mobile */
    #resizer{
      width:100%; height:10px;
      cursor:row-resize;
      border-left:none; border-right:none;
      border-top:1px solid var(--border);
      border-bottom:1px solid var(--border);
      order:2; /* sits just above sidebar (same order, earlier in DOM) */
    }
    #resizer::before{
      width:24px; height:3px;
      background:radial-gradient(circle, var(--muted) 1.5px, transparent 1.5px);
      background-size:6px 3px;
    }
  }
</style>
</head>
<body>

<header>
  <span class="wordmark">Western Washington Transit Explorer</span>
  <div class="divider"></div>
  <span class="feed-label"></span>
  <div class="status-pill loading" id="statusPill">
    <div class="dot"></div>
    <span id="statusText">Connecting…</span>
  </div>
</header>

<div class="main" style="position:relative;">

  <div class="sidebar" id="sidebar">

    <div class="sidebar-section" style="padding-bottom:10px;">
      <div class="section-label">Map View</div>
      <div class="mode-switcher" id="modeSwitcher">
        <button class="mode-btn active" data-mode="sl">Service Level</button>
        <button class="mode-btn" data-mode="trolley">Trolleybus Network</button>
        <button class="mode-btn" data-mode="row">Transit Right-of-way</button>
      </div>
      <div class="period-switcher" id="periodSwitcher" style="display:flex;">
        <button class="period-btn active" data-period="ServiceLevel">Daytime</button>
        <button class="period-btn" data-period="ServiceLevel_AMPeak">AM Peak</button>
        <button class="period-btn" data-period="ServiceLevel_Midday">Mid-day</button>
        <button class="period-btn" data-period="ServiceLevel_PMPeak">PM Peak</button>
      </div>
    </div>
    <div class="layers-list" id="legendList">
      <div style="padding:20px 16px;color:var(--muted);font-size:12px;">Loading…</div>
    </div>

  </div>

  <div id="resizer"></div>

  <div style="flex:1;position:relative;display:flex;flex-direction:column;min-height:0;">
    <div id="map"></div>

    <div class="loader" id="loader">
      <div class="spinner"></div>
      <div class="loader-text" id="loaderText">Fetching feed metadata…</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="loader-sub" id="loaderSub"></div>
    </div>

    <div class="info-panel" id="infoPanel">
      <div class="info-header">
        <button class="back-btn" id="backBtn">←</button>
        <h3 id="infoPanelTitle">Feature Properties</h3>
        <button class="close-info" id="closeInfo">✕</button>
      </div>
      <div class="info-body" id="infoContent"></div>
    </div>
  </div>
</div>

<div id="agency-tooltip"></div>

<script>
// Global agency tooltip
const agencyTooltip = document.getElementById('agency-tooltip');
document.addEventListener('mouseover', e => {
  const badge = e.target.closest('.route-badge');
  if (badge && badge.dataset.agency) {
    agencyTooltip.textContent = badge.dataset.agency;
    agencyTooltip.style.display = 'block';
  }
});
document.addEventListener('mousemove', e => {
  if (agencyTooltip.style.display === 'block') {
    agencyTooltip.style.left = (e.clientX + 12) + 'px';
    agencyTooltip.style.top  = (e.clientY - 28) + 'px';
  }
});
document.addEventListener('mouseout', e => {
  if (e.target.closest('.route-badge')) {
    agencyTooltip.style.display = 'none';
  }
});

const BASE = 'https://services7.arcgis.com/m6uLpqj7MgjPU371/arcgis/rest/services/Western_Washington_Transit_Network/FeatureServer';
const LAYER_ID = 2;

// Layer classifier — spatial route layers only
const isRoute = n => /route/i.test(n) && !/table/i.test(n) && !/metro/i.test(n) && !/attribute/i.test(n);

// ── Coded domain lookups ─────────────────────────────────────────────────────
const DOMAINS = {
  ServiceLevel_v2: {
    100:'Light Rail',
    105:'Very Frequent (≤10 min)',
    104:'Frequent (10-15 min)',
    106:'Frequent (15 min)',
    107:'Partial Frequent (15-30 min)',
    108:'Regular (30 min)',
    109:'Regular (>30 min)',
    116:'Peak Only',
    199:'Dial-A-Ride Transit (DART)',
	295:'Night-owl Only',
	299:'Snow Route Only',
	998:'No Regular Service'
  },
  TrolleyWire: {
    0:'Inactive', 1:'Active', 2:'Active - No scheduled service', 3:'Under Construction', 4:'Planned'
  },
  TransitROW: {
    1:'None',
    2:'Time Restricted Bus-only / BAT Lane',
    3:'Managed Lane (HOV or Toll Lane)',
    4:'All-day Transit-Only / BAT Lane',
    5:'Freight and Bus (FAB) Lane',
    6:'Dedicated Transit Only Lane (Busway / At-Grade Rail)',
    7:'Grade-Separated Light Rail',
    9:'Bus Lane Under Construction',
   10:'Bus Lane Planned',
  },
  YesNo:   { 0:'No', 1:'Yes' },
  ServiceType: {
    1:'Heavy Rail',              2:'Light Rail',
    3:'Commuter/Regional Rail',  4:'Arterial Rapid Bus Transit',
    5:'Freeway Rapid Bus Transit',6:'Local Service',
    7:'Regional Express',        8:'Peak Commuter Service',
    9:'Streetcar',               999:'No Service'
  },
  SDOT_FTN: {
    0:'City Center',    6:'Frequent: Better than 10 min',
    10:'Frequent: 10 min', 15:'Frequent: 15 min',
    998:'Other Transit', 999:'Undefined',
    1000:'Not Serviced', 9999:'Outside Seattle'
  },
  Agency: {
    ST:'Sound Transit',    KM:'King County Metro',
    CT:'Community Transit',PT:'Pierce Transit',
    IT:'Island Transit',   KT:'Kitsap Transit',
    ET:'Everett Transit',  SkT:'Skagit Transit',
    OT:'Intercity Transit'
  },
  WeekendSchedule: { 0:'Same as weekday', 1:'Reduced', 2:'None' }
};

// ── Service Level color map ───────────────────────────────────────────────────
const SL_META = {
  100: { cat:'Rail infrastructure',  bg:'#FFE566', text:'#3D3000' },
  105: { cat:'High frequency',       bg:'#FF5FA3', text:'#4D0D28' },
  104: { cat:'High frequency',       bg:'#56B4E9', text:'#0A2D42' },
  106: { cat:'High frequency',       bg:'#56B4E9', text:'#0A2D42' },
  107: { cat:'Partial frequency',    bg:'#8BAA8C', text:'#3D2800' },
  206: { cat:'Partial frequency',    bg:'#8BAA8C', text:'#3D2800' },
  207: { cat:'Partial frequency',    bg:'#8BAA8C', text:'#3D2800' },
  108: { cat:'Regular',              bg:'#CC7722', text:'#3A1E00' },
  109: { cat:'Regular',              bg:'#994422', text:'#301200' },
  116: { cat:'Limited / special',    bg:'#773388', text:'#250D2C' },
  199: { cat:'Demand-responsive',    bg:'#9977CC', text:'#241545' },
  998: { cat:'No Regular Service',   bg:'#B2B2B2', text:'#250D2C' },
  999: { cat:'No Regular Service',   bg:'#B2B2B2', text:'#250D2C' },
  299: { cat:'No Regular Service',   bg:'#B2B2B2', text:'#250D2C' },
  295: { cat:'No Regular Service',   bg:'#B2B2B2', text:'#250D2C' },
};
// ── Service Level normalization ───────────────────────────────────────────────
// Maps consolidated codes to their canonical representative
function normalizeSL(val) {
  if (val == null) return val;
  const v = Number(val);
  if (v === 106) return 104; // → Frequent (10-15 min)
  if (v === 207 || v === 206) return 107; // → Regular (15-30 min)
  if (v === 113 || v === 110) return 109; // → Regular (>30 min)
  if (v === 998 || v === 999 || v === 299 || v === 295) return 998; //  → No Regular Service
  return v;
}

// ── Agency color map ─────────────────────────────────────────────────────────
const AGENCY_COLORS = {
  ST:  { bg:'#1B4B8A', text:'#ffffff', name:'Sound Transit' },
  KM:  { bg:'#005C99', text:'#ffffff', name:'King County Metro' },
  CT:  { bg:'#006747', text:'#ffffff', name:'Community Transit' },
  PT:  { bg:'#D4002A', text:'#ffffff', name:'Pierce Transit' },
  IT:  { bg:'#F5A800', text:'#3a2800', name:'Island Transit' },
  KT:  { bg:'#5B2D8E', text:'#ffffff', name:'Kitsap Transit' },
  ET:  { bg:'#E87722', text:'#ffffff', name:'Everett Transit' },
  SkT: { bg:'#4C9B3F', text:'#ffffff', name:'Skagit Transit' },
  OT:  { bg:'#7B5EA7', text:'#ffffff', name:'Intercity Transit' },
};

// Field name → domain key
const FIELD_DOMAIN = {
  ServiceLevel:        'ServiceLevel_v2',
  ServiceLevel_AMPeak: 'ServiceLevel_v2',
  ServiceLevel_Midday: 'ServiceLevel_v2',
  ServiceLevel_PMPeak: 'ServiceLevel_v2',
  ServiceLevel_2027:   'ServiceLevel_v2',
  ServiceLevel_2032:   'ServiceLevel_v2',
  ServiceLevel_2039:   'ServiceLevel_v2',
  ServiceLevel_2050:   'ServiceLevel_v2',
  Electrified:         'TrolleyWire',
  TransitROW:          'TransitROW',
  Stops:               'YesNo',
  ServiceType:         'ServiceType',
  SeattleFTN:          'SDOT_FTN',
  Agency:              'Agency',
  WeekendSchedule:     'WeekendSchedule'
};

// Fields to show in the info panel (API order preserved)
const DISPLAY_FIELDS = [
  'TransitROW',
];

function decodeDomain(field, value) {
  if (value === null || value === undefined || value === '') return null;
  const domain = DOMAINS[FIELD_DOMAIN[field]];
  if (!domain) return value;
  return domain[value] ?? value;
}

// ── Leaflet ──────────────────────────────────────────────────────────────────
const map = L.map('map',{center:[47.6062,-122.3321],zoom:13});
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 19,
  attribution: 'Esri World Imagery'
}).addTo(map);

let layerGroups    = {};
let layerGroupsAll = {};
let layerGeomTypes = {};
let activePeriod   = 'ServiceLevel';
let displayMode    = 'sl';
let modeChanging   = false;

const allFeatureProps      = [];
const allFeaturePropsAll   = [];
const allGeoJSONFeaturesAll = [];

let _spatialDefsGlobal   = [];
let _dateFilterAllGlobal = '';
let overlayLayersLoaded  = false;

// ── Period colour helpers ─────────────────────────────────────────────────────
function getSlColor(val) {
  const nval = normalizeSL(val);
  if (nval == null) return '#4fc3f7';
  const src = SL_COLOR_MAP[nval] ?? SL_META[nval];
  return src ? src.bg : '#4fc3f7';
}
function featureColorForPeriod(props) {
  const val = props?.[activePeriod];
  return val == null ? '#4fc3f7' : getSlColor(val);
}

// ── Overlay colour tables ─────────────────────────────────────────────────────
const MUTED = { color:'#252d3d', weight:1, opacity:0.22, fillOpacity:0 };

const TROLLEY_STYLE = {
  1: { color:'#00CFFF', weight:3,   opacity:0.95, fillOpacity:0 },
  2: { color:'#3A7CA5', weight:2.5, opacity:0.80, fillOpacity:0 },
  3: { color:'#FFAA00', weight:2.5, opacity:0.85, fillOpacity:0 },
  4: { color:'#5588AA', weight:2,   opacity:0.65, fillOpacity:0 },
};

const ROW_STYLE = {
  2: { color:'#FFD700', weight:3, opacity:0.90, fillOpacity:0 },
  3: { color:'#FF8C00', weight:3, opacity:0.90, fillOpacity:0 },
  4: { color:'#00CC66', weight:3, opacity:0.90, fillOpacity:0 },
  5: { color:'#00AAAA', weight:3, opacity:0.90, fillOpacity:0 },
  6: { color:'#00FFCC', weight:3, opacity:0.90, fillOpacity:0 },
  7: { color:'#CC88FF', weight:3, opacity:0.90, fillOpacity:0 },
  9: { color:'#FF6600', weight:3, opacity:0.90, fillOpacity:0 },
 10: { color:'#FF6600', weight:3, opacity:0.90, fillOpacity:0 },
};

// ── Style helpers ─────────────────────────────────────────────────────────────
function getFeatureStyle(props) {
  if (displayMode === 'trolley') return TROLLEY_STYLE[props?.Electrified]  ?? MUTED;
  if (displayMode === 'row')     return ROW_STYLE[props?.TransitROW]       ?? MUTED;
  const val = props?.[activePeriod];
  if (val == null || Number(val) >= 998) return { color:'#E1E1E1', weight:1, opacity:0.4, fillOpacity:0 };
  const c = featureColorForPeriod(props);
  return { color:c, weight:2, opacity:0.9, fillColor:c, fillOpacity:0.2, offset:0.8 };
}

// Returns true when a feature is muted in the current overlay mode —
// used to suppress click and mouseover on irrelevant segments
function isHidden(props) {
  return getFeatureStyle(props) === MUTED;
}

function refreshBaseStyle() {
  const groups = displayMode === 'sl' ? layerGroups : layerGroupsAll;
  Object.values(groups).forEach(group => {
    group.setStyle(feature => getFeatureStyle(feature.properties));
  });
}

// ── Lazy overlay loader ───────────────────────────────────────────────────────
async function loadOverlayLayers() {
  if (overlayLayersLoaded) return;
  for (let i = 0; i < _spatialDefsGlobal.length; i++) {
    const def = _spatialDefsGlobal[i];
    const pct = 10 + Math.round(((i+1)/_spatialDefsGlobal.length)*80);
    setLoader(true, `Loading "${def.name}"…`, 'Including all service levels…', pct);
    try {
      const geomType = layerGeomTypes[def.id] || 'esriGeometryPolyline';
      const features = await fetchAll(def.id, _dateFilterAllGlobal);
      const geojsonFeatures = features.map(f => toGeoJSON(f, geomType)).filter(Boolean);
      features.forEach(f => allFeaturePropsAll.push(f.attributes || {}));
      geojsonFeatures.forEach(f => allGeoJSONFeaturesAll.push(f));
      const group = L.geoJSON({ type:'FeatureCollection', features:geojsonFeatures }, {
        style: feature => getFeatureStyle(feature.properties),
        pointToLayer: (feature, latlng) => {
          const s = getFeatureStyle(feature.properties);
          return L.circleMarker(latlng, {
            radius:5, fillColor:s.color, color:'#fff', weight:1, opacity:s.opacity??1, fillOpacity:0.9
          });
        },
        onEachFeature: (feature, lyr) => {
          lyr.on('click',     () => { if (!isHidden(feature.properties)) showInfoPanel(def.name, feature.properties || {}); });
          lyr.on('mouseover', function() { if (!isHidden(feature.properties)) this.setStyle({weight:5, opacity:1}); });
          lyr.on('mouseout',  function() { this.setStyle(getFeatureStyle(feature.properties)); });
        }
      });
      layerGroupsAll[def.id] = group;
    } catch(err) {
      console.error(`Overlay layer "${def.name}" failed:`, err);
    }
  }
  overlayLayersLoaded = true;
}

// ── Display mode switcher ─────────────────────────────────────────────────────
async function setDisplayMode(mode) {
  if (modeChanging || mode === displayMode) return;
  modeChanging = true;
  try {
    displayMode = mode;
    document.querySelectorAll('.mode-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.mode === mode);
    });
    $('periodSwitcher').style.display = mode === 'sl' ? 'flex' : 'none';
    if (mode === 'sl') {
      Object.values(layerGroupsAll).forEach(g => { try { map.removeLayer(g); } catch(e){} });
      Object.values(layerGroups).forEach(g => { try { g.addTo(map); } catch(e){} });
      refreshBaseStyle();
      buildLegend();
    } else {
      Object.values(layerGroups).forEach(g => { try { map.removeLayer(g); } catch(e){} });
      if (!overlayLayersLoaded) { await loadOverlayLayers(); setLoader(false); }
      Object.values(layerGroupsAll).forEach(g => { try { g.addTo(map); } catch(e){} });
      refreshBaseStyle();
      buildLegend();
      if (mode === 'trolley') {
        const electrified = allGeoJSONFeaturesAll.filter(f => Number(f.properties?.Electrified ?? 0) !== 0);
        if (electrified.length) {
          const bounds = L.geoJSON({ type:'FeatureCollection', features:electrified }).getBounds();
          if (bounds.isValid()) map.fitBounds(bounds, { padding:[40,40] });
        }
      }
    }
  } finally { modeChanging = false; }
}

function formatVal(v) {
  if (typeof v === 'number' && v > 1e12) {
    const d = new Date(v);
    return isNaN(d) ? v : d.toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});
  }
  return v==null ? '—' : String(v);
}

function slBarSeg(period, val) {
  const nval = normalizeSL(val);
  const src = SL_COLOR_MAP[nval] ?? SL_META[nval];
  const bg  = src ? src.bg   : 'rgba(100,160,255,0.08)';
  const col = src ? src.text : 'var(--muted)';
  const label = nval != null ? (decodeDomain('ServiceLevel', nval) ?? '—') : '—';
  return '<div class="sl-bar-seg" style="background:' + bg + ';color:' + col + '">'
    + '<span class="sl-bar-period">' + period + '</span>'
    + '<span class="sl-bar-label">' + label + '</span>'
    + '</div>';
}

function renderRows(attrs) {
  const amVal = attrs.ServiceLevel_AMPeak;
  const mdVal = attrs.ServiceLevel_Midday;
  const pmVal = attrs.ServiceLevel_PMPeak;

  const hasBar = amVal != null || mdVal != null || pmVal != null;
  let out = '';

  if (hasBar) {
    const amEffective = (amVal > 997) ? null : amVal;
    const mdEffective = (mdVal > 997) ? null : amVal;
    const pmEffective = (pmVal > 997) ? null : pmVal;
    out += '<div class="info-section-title" style="margin-top:0">Service Level</div>';
    out += '<div class="sl-bar">'
      + slBarSeg('AM', amEffective)
      + slBarSeg('MD', mdEffective)
      + slBarSeg('PM', pmEffective)
      + '</div>';
  }

  out += Object.entries(attrs)
    .filter(([k, v]) => DISPLAY_FIELDS.includes(k) && v !== null && v !== '' && v !== undefined)
    .map(([k, v]) => {
      const alias   = FIELD_ALIAS[k] ?? k;
      const display = decodeDomain(k, v);
      return '<div class="info-row"><span class="info-key">' + alias + '</span><span class="info-val">' + formatVal(display) + '</span></div>';
    })
    .join('');

  return out;
}

function showInfoPanel(layerName, props) {
  // Format: "Segment {gid} - {SegmentName}" or just "Segment {gid}"
  const gid = props?.GeoID ?? props?.geoid ?? props?.GEOID;
  const segmentName = props?.SegmentName || props?.Segment_Name || null;
  
  let title = gid != null ? `Segment ${gid}` : 'Segment —';
  if (segmentName) title += ` - ${segmentName}`;
  $('infoPanelTitle').textContent = title;

  const tRows = (gid != null ? transitLookup[gid] : null) || [];

  let html = Object.keys(props).length
    ? renderRows(props)
    : '<div style="color:var(--muted);font-size:11px;">No attributes</div>';

  const activeRows = tRows;

  if (activeRows.length) {
    const uniqueRouteCount = new Set(activeRows.map(r => r.Route ?? r.route)).size;
    html += `<div class="info-section-title">Transit Routes (${uniqueRouteCount})</div>`;
    html += `<div class="transit-cards">`;

    // Group by ServiceLevel, sorted ascending by numeric value (nulls last)
    const groups = {};
    activeRows.forEach(r => {
      const slRaw = r.ServiceLevel != null ? r.ServiceLevel : null;
      const slKey = slRaw != null ? slRaw : '__null__';
      if (!groups[slKey]) groups[slKey] = [];
      groups[slKey].push(r);
    });
    const sortedKeys = Object.keys(groups).sort((a, b) => {
      if (a === '__null__') return 1;
      if (b === '__null__') return -1;
      return Number(a) - Number(b);
    });

    sortedKeys.forEach(slKey => {
      const slLabel = slKey === '__null__' ? 'Unknown' : (decodeDomain('ServiceLevel', Number(slKey)) ?? slKey); // use non-normalized slkey to return true SL value
      const src = SL_COLOR_MAP[Number(slKey)] ?? SL_META[Number(slKey)];
      const pillStyle = src ? 'background:' + src.bg + ';color:' + src.text : 'background:var(--panel2);color:var(--muted)';
      html += `<div class="transit-group-label"><span class="tgl-pill" style="${pillStyle}">${slLabel}</span><span class="tgl-line"></span></div>`;
      // Deduplicate by route number within each ServiceLevel group
      const seenRoutes = new Set();
      const uniqueRoutes = groups[slKey].filter(r => {
        const key = r.Route ?? r.route;
        if (seenRoutes.has(key)) return false;
        seenRoutes.add(key);
        return true;
      });

      // Render all badges in one wrapping flex row per service level group
      html += '<div class="transit-card"><div style="display:flex;flex-wrap:wrap;gap:5px;">';
      uniqueRoutes.forEach(r => {
        const routeNum   = r.Route;
        const RtAttrKey  = r.Segment_RouteBound;
        const info       = routeLookup[RtAttrKey] ?? {};
        const agency     = info.agency;
        const shortLabel = info.short ?? String(routeNum);
        const ac         = AGENCY_COLORS[agency] ?? { bg:'#2a3a52', text:'#dce8f5', name: agency ?? '' };
        const badge_bg   = info.Color_RouteBadge ?? ac.bg;
        const badge_text = info.Color_RouteText ?? ac.text;
        const badgeStyle = 'background:' + badge_bg + ';color:' + badge_text;
        const agency_full = decodeDomain('Agency', agency) ?? agency ?? '';
        html += '<span class="route-badge" style="' + badgeStyle + '" data-agency="' + agency_full + '">'
          + shortLabel
          + '</span>';
      });
      html += '</div></div>';
    });

    html += `</div>`;
  }

  $('infoContent').innerHTML = html;
  $('infoPanel').classList.add('visible');
  // On mobile, hide sidebar when info panel is shown
  if (window.innerWidth <= 768) {
    $('sidebar').classList.add('hidden-mobile');
  }
}

// ── Resizer ──────────────────────────────────────────────────────────────────
// Draggable divider between sidebar and map. Desktop = horizontal resize,
// mobile = vertical resize. Stores preference in localStorage.
(function() {
  const resizer = $('resizer');
  const sidebar = $('sidebar');
  const main = document.querySelector('.main');
  let startPos = 0, startSize = 0, isDragging = false;

  const isMobile = () => window.innerWidth <= 768;
  
  const saveSize = (size) => {
    try {
      localStorage.setItem(isMobile() ? 'sidebarHeightMobile' : 'sidebarWidth', size);
    } catch(e) {}
  };
  
  const loadSize = () => {
    try {
      const saved = localStorage.getItem(isMobile() ? 'sidebarHeightMobile' : 'sidebarWidth');
      if (saved) {
        if (isMobile()) {
          sidebar.style.height = saved + 'px';
        } else {
          sidebar.style.width = saved + 'px';
        }
      }
    } catch(e) {}
  };

  resizer.addEventListener('mousedown', e => {
    isDragging = true;
    resizer.classList.add('dragging');
    startPos = isMobile() ? e.clientY : e.clientX;
    startSize = isMobile() ? sidebar.offsetHeight : sidebar.offsetWidth;
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const delta = (isMobile() ? e.clientY : e.clientX) - startPos;
    const newSize = Math.max(200, Math.min(isMobile() ? 500 : 500, startSize + (isMobile() ? delta : delta)));
    if (isMobile()) {
      sidebar.style.height = newSize + 'px';
    } else {
      sidebar.style.width = newSize + 'px';
    }
  });

  document.addEventListener('mouseup', () => {
    if (isDragging) {
      isDragging = false;
      resizer.classList.remove('dragging');
      const size = isMobile() ? sidebar.offsetHeight : sidebar.offsetWidth;
      saveSize(size);
    }
  });

  // Load saved size on page load
  loadSize();
  
  // Re-apply saved size on window resize (desktop ↔ mobile transition)
  window.addEventListener('resize', loadSize);
})();

// ── Data helpers ─────────────────────────────────────────────────────────────
async function fetchAll(layerId, where) {
  const PAGE = 1000;
  let offset = 0, all = [], exceeded = true;
  while (exceeded) {
    const p = new URLSearchParams({ where, outFields:'*', outSR:'4326', resultOffset:offset, resultRecordCount:PAGE, f:'json' });
    const d = await (await fetch(`${BASE}/${layerId}/query?${p}`)).json();
    if (d.error) throw new Error(d.error.message);
    all = all.concat(d.features || []);
    exceeded = d.exceededTransferLimit === true && (d.features||[]).length > 0;
    offset += PAGE;
  }
  return all;
}

function toGeoJSON(feature, geomType) {
  if (!feature.geometry) return null;
  const g = feature.geometry;
  let geometry;
  if      (geomType.includes('Point'))    geometry = { type:'Point',            coordinates:[g.x, g.y] };
  else if (geomType.includes('Polyline')) geometry = { type:'MultiLineString',   coordinates: g.paths||[] };
  else if (geomType.includes('Polygon'))  geometry = { type:'MultiPolygon',      coordinates: g.rings ? [g.rings] : [] };
  else return null;
  return { type:'Feature', geometry, properties:feature.attributes };
}

// ── Legend ───────────────────────────────────────────────────────────────────
const DRAW_ORDER = {
	SL: [100, 105, 104, 107, 108, 109, 116, 199, 998],
	TROLLEY: [1, 2, 3, 4, 0],
	BUSLANE: [7, 6, 5, 4, 2, 3, 9, 10, 1],
};
const SL_DRAW_ORDER_LEGEND = DRAW_ORDER['SL'];
const slCounts = {}; // ServiceLevel → count of features

// ── Custom draw order sort ──────────────────────────────────────────────────
// Sorts GeoJSON features so first item in SL_DRAW_ORDER_LEGEND renders on top
// (last in array = drawn last by Leaflet = visually on top).
// Build a rank map: first SL code → highest rank (drawn last = on top)
const SL_DRAW_RANK = {};
SL_DRAW_ORDER_LEGEND.forEach((code, i) => { SL_DRAW_RANK[code] = SL_DRAW_ORDER_LEGEND.length - i; });

function sortFeaturesBySL(features, field) {
  return features.sort((a, b) => {
    const rankA = SL_DRAW_RANK[normalizeSL(a.properties?.[field])] ?? 0;
    const rankB = SL_DRAW_RANK[normalizeSL(b.properties?.[field])] ?? 0;
    // Low rank first (bottom), high rank last (top)
    return rankA - rankB;
  });
}

function buildLegend(slCounts_override) {
  const container = $('legendList');
  container.innerHTML = '';
  if (displayMode === 'trolley') {
    const present = new Set(allFeaturePropsAll.map(p => p.Electrified).filter(v => v != null && Number(v) !== 0));
    [[1,'#00CFFF'],[2,'#3A7CA5'],[3,'#FFAA00'],[4,'#5588AA']].forEach(([code, color]) => {
      if (!present.has(code) && !present.has(String(code))) return;
      const item = document.createElement('div'); item.className = 'legend-item';
      item.innerHTML = `<div class="legend-swatch" style="background:${color}"></div><div class="legend-label">${DOMAINS.TrolleyWire[code] ?? code}</div>`;
      container.appendChild(item);
    });
    return;
  }
  if (displayMode === 'row') {
    const present = new Set(allFeaturePropsAll.map(p => p.TransitROW).filter(v => v != null && Number(v) !== 1));
    [[2,'#FFD700'],[3,'#FF8C00'],[4,'#00CC66'],[5,'#00AAAA'],[6,'#00FFCC'],[7,'#CC88FF'],[9,'#FF6600']].forEach(([code, color]) => {
      if (!present.has(code) && !present.has(String(code))) return;
      const item = document.createElement('div'); item.className = 'legend-item';
      item.innerHTML = `<div class="legend-swatch" style="background:${color}"></div><div class="legend-label">${DOMAINS.TransitROW[code] ?? code}</div>`;
      container.appendChild(item);
    });
    return;
  }
  const counts = slCounts_override ?? slCounts;
  SL_DRAW_ORDER_LEGEND.forEach(code => {
    const count = counts[code]; if (!count) return;
    const src = SL_COLOR_MAP[code] ?? SL_META[code]; if (!src) return;
    const item = document.createElement('div'); item.className = 'legend-item';
    item.innerHTML = `<div class="legend-swatch" style="background:${src.bg}"></div><div class="legend-label">${decodeDomain('ServiceLevel', code) ?? code}</div><div class="legend-count">${count.toLocaleString()}</div>`;
    container.appendChild(item);
  });
}

function switchPeriod(field) {
  activePeriod = field;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.toggle('active', b.dataset.period === field));
  refreshBaseStyle();
  const counts = {};
  allFeatureProps.forEach(props => {
    const sl = normalizeSL(props[field]);
    if (sl != null) counts[sl] = (counts[sl] ?? 0) + 1;
  });
  buildLegend(counts);
}

// ── Main ─────────────────────────────────────────────────────────────────────
async function init() {
  try {
    setStatus('loading','Connecting…');
    setLoader(true,'Fetching FeatureServer metadata…','',5);

    // 1. Fetch service metadata for layer info
    const meta = await (await fetch(`${BASE}?f=json`)).json();
    if (meta.error) throw new Error(meta.error.message);

    // Use the single consolidated layer (ID 2)
    const mainLayer = (meta.layers||[]).find(l => l.id === LAYER_ID);
    if (!mainLayer) throw new Error(`Layer ${LAYER_ID} not found in service`);
    
    const spatialDefs = [mainLayer];
    const transitTables   = (meta.tables||[]).filter(l => /transit_table$/i.test(l.name));
    const routeAttrTables = (meta.tables||[]).filter(l => /routeatt/i.test(l.name));



    // Date string (shared by route + table filters)
    const TODAY = new Date();
    const pad = n => String(n).padStart(2,'0');
    const todayStr = `${TODAY.getFullYear()}-${pad(TODAY.getMonth()+1)}-${pad(TODAY.getDate())}`;
    const dateFilter =
      `(Segment_StartDate IS NULL OR Segment_StartDate <= DATE '${todayStr}') AND ` +
      `(Segment_EndDate IS NULL OR Segment_EndDate >= DATE '${todayStr}') AND ` +
      `ServiceLevel NOT IN (298, 998, 999)`;
    const tableFilter =
      `(StartDate IS NULL OR StartDate <= DATE '${todayStr}') AND ` +
      `(EndDate IS NULL OR EndDate >= DATE '${todayStr}') AND ` +
      `ServiceLevel NOT IN (298, 998, 999)`;

    // Store for lazy overlay loading — date only, no ServiceLevel exclusion
    _spatialDefsGlobal   = spatialDefs;
    _dateFilterAllGlobal =
      `(Segment_StartDate IS NULL OR Segment_StartDate <= DATE '${todayStr}') AND ` +
      `(Segment_EndDate IS NULL OR Segment_EndDate >= DATE '${todayStr}')`;

    // 2. Load each route layer, collect GeoIDs as we go
    const routeGeoIDs = new Set();

    for (let i=0; i<spatialDefs.length; i++) {
      const def = spatialDefs[i];
      const pct = 10 + Math.round(((i+1)/spatialDefs.length)*70);
      setLoader(true, `Loading "${def.name}"…`, 'Fetching features…', pct);

      try {
        const info     = await (await fetch(`${BASE}/${def.id}?f=json`)).json();
        const geomType = info.geometryType || 'esriGeometryPolyline';

        // Build color lookup from renderer
        const renderer = info.drawingInfo?.renderer;
        const colorLookup = {};
        let defaultColor = '#4fc3f7';

        if (renderer?.type === 'uniqueValue') {
          (renderer.uniqueValueInfos || []).forEach(uvi => {
            const sym = uvi.symbol;
            if (!sym) return;
            const [r,g,b,a] = sym.color || [79,195,247,255];
            const bg = `rgba(${r},${g},${b},${(a/255).toFixed(2)})`;
            colorLookup[uvi.value] = bg;
            // Populate global map on first layer — derive readable text color
            const brightness = 0.299*r + 0.587*g + 0.114*b;
            SL_COLOR_MAP[uvi.value] = { bg, text: brightness > 140 ? '#1a1a1a' : '#ffffff' };
          });
          if (renderer.defaultSymbol?.color) {
            const [r,g,b,a] = renderer.defaultSymbol.color;
            defaultColor = `rgba(${r},${g},${b},${(a/255).toFixed(2)})`;
          }
        }

        // Cache for reuse by loadOverlayLayers
        layerGeomTypes[def.id] = geomType;

        const features = await fetchAll(def.id, dateFilter);

        const cntEl = $(`cnt-${def.id}`);
        if (cntEl) cntEl.textContent = features.length.toLocaleString();

        const geojsonFeatures = features.map(f => toGeoJSON(f, geomType)).filter(Boolean);
        // Sort by custom draw order — first item in SL_DRAW_ORDER renders on top
        sortFeaturesBySL(geojsonFeatures, activePeriod);
        features.forEach(f => {
          const gid = f.attributes?.GeoID ?? f.attributes?.geoid ?? f.attributes?.GEOID;
          if (gid != null) routeGeoIDs.add(gid);
          allFeatureProps.push(f.attributes || {});
          const sl = normalizeSL(f.attributes?.ServiceLevel);
          if (sl != null) slCounts[sl] = (slCounts[sl] ?? 0) + 1;
        });

        const group = L.geoJSON({ type:'FeatureCollection', features:geojsonFeatures }, {
          style: feature => {
            const c = featureColorForPeriod(feature.properties);
            return { color:c, weight:2, opacity:0.9, fillColor:c, fillOpacity:0.2, offset:0.8 };
          },
          pointToLayer: (feature, latlng) => {
            const c = featureColor(feature.properties);
            return L.circleMarker(latlng, {
              radius:5, fillColor:c, color:'#fff', weight:1, opacity:1, fillOpacity:0.9
            });
          },
          onEachFeature: (feature, lyr) => {
            lyr.on('click',     () => { if (!isHidden(feature.properties)) showInfoPanel(def.name, feature.properties || {}); });
            lyr.on('mouseover', function() { if (!isHidden(feature.properties)) this.setStyle({weight:4, opacity:1}); });
            lyr.on('mouseout',  function() { this.setStyle(getFeatureStyle(feature.properties)); });
          }
        });

        layerGroups[def.id] = group;
        group.addTo(map);

      } catch(err) {
        console.error(`Layer "${def.name}" failed:`, err);
        const el = $(`cnt-${def.id}`);
        if (el) el.textContent = 'error';
      }
    }

    // 3. Fetch Transit_Table — Stage 1 (server-side date filter)
    if (transitTables.length) {
      const tbl = transitTables[0];
      setLoader(true, `Loading "${tbl.name}"…`, `Stage 1: date filter`, 82);

      try {
        const rawRows = await fetchAll(tbl.id, tableFilter);

        // Stage 2 — in-memory filter to only GeoIDs present in loaded routes
        const filtered = rawRows.filter(f => {
          const gid = f.attributes?.GeoID ?? f.attributes?.geoid ?? f.attributes?.GEOID;
          return gid != null && routeGeoIDs.has(gid);
        });

        // Build lookup: GeoID → [rows]
        filtered.forEach(f => {
          const a   = f.attributes;
          const gid = a?.GeoID ?? a?.geoid ?? a?.GEOID;
          if (gid == null) return;
          if (!transitLookup[gid]) transitLookup[gid] = [];
          transitLookup[gid].push(a);
        });


      } catch(err) {
        console.error('Transit_Table failed:', err);
      }
    }

    // 4. Fetch RouteAttribute table — build Route → Agency lookup
    if (routeAttrTables.length) {
      const tbl = routeAttrTables[0];
      setLoader(true, `Loading "${tbl.name}"…`, 'Building agency lookup', 92);
      try {
        const rows = await fetchAll(tbl.id, '1=1');
        rows.forEach(f => {
          const a      = f.attributes;
          const RtAttrKey = a.Route_Bound
		  const Color_RouteBadge = a.RouteColor ? '#' + a.RouteColor : null;
		  const Color_RouteText  = a.TextColor  ? '#' + a.TextColor  : null;
          const agency = a.Agency
          const short  = a.RouteShort
          if (RtAttrKey == null) return;
          routeLookup[RtAttrKey] = { agency, short, Color_RouteBadge, Color_RouteText};
        });
      } catch(err) {
        console.error('RouteAttribute table failed:', err);
      }
    }

    buildLegend();
    setLoader(false);
    setStatus('', ' loaded');
    const dot = $('statusPill').querySelector('.dot');
    if (dot) dot.style.animation = 'none';

  } catch(err) {
    setLoader(false);
    setStatus('error','Load failed');
    $('legendList').innerHTML = `<div style="padding:16px;color:var(--red);font-size:12px;">${err.message}</div>`;
    console.error(err);
  }
}

init();
</script>
</body>
</html>
