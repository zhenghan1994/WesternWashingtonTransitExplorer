<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seattle CSA Transit Network</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet-polylineoffset@1.1.1/leaflet.polylineoffset.min.js"></script>
<style>
  :root {
    --bg:#080c14; --panel:#0e1520; --panel2:#141d2e;
    --border:rgba(100,160,255,0.12);
    --accent:#4fc3f7; --green:#43e09b; --orange:#ff9f43;
    --pink:#f368e0; --yellow:#ffd32a; --red:#ff6b6b; --purple:#a55eea;
    --text:#dce8f5; --muted:#5a7a9a;
    --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{font-family:var(--sans);background:var(--bg);color:var(--text);display:flex;flex-direction:column}

  /* Header */
  header{display:flex;align-items:center;gap:14px;padding:0 18px;height:52px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;z-index:1000}
  .wordmark{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);white-space:nowrap}
  .divider{width:1px;height:20px;background:var(--border);flex-shrink:0}
  .feed-label{font-family:var(--mono);font-size:10px;color:var(--muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .status-pill{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;background:rgba(67,224,155,.1);border:1px solid rgba(67,224,155,.25);font-family:var(--mono);font-size:10px;color:var(--green);flex-shrink:0;transition:all .3s}
  .status-pill.loading{background:rgba(79,195,247,.1);border-color:rgba(79,195,247,.25);color:var(--accent)}
  .status-pill.error{background:rgba(255,107,107,.1);border-color:rgba(255,107,107,.25);color:var(--red)}
  .dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  /* Layout */
  .main{display:flex;flex:1;overflow:hidden}

  /* Sidebar */
  .sidebar{width:290px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;z-index:500}
  .sidebar-section{padding:14px 16px;border-bottom:1px solid var(--border)}
  .section-label{font-family:var(--mono);font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  .stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .stat-box{background:var(--panel2);border:1px solid var(--border);border-radius:6px;padding:10px}
  .stat-val{font-family:var(--mono);font-size:18px;font-weight:600;color:var(--accent);line-height:1;margin-bottom:3px}
  .stat-label{font-size:10px;color:var(--muted)}
  .date-badge{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;background:rgba(79,195,247,.06);border:1px solid rgba(79,195,247,.15);font-family:var(--mono);font-size:10px;color:var(--accent)}
  .date-badge span.lbl{color:var(--muted);font-size:9px}

  /* Layers */
  .layers-list{overflow-y:auto;flex:1;padding:8px 0}
  .layer-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;transition:background .15s;border-left:3px solid transparent}
  .layer-item:hover{background:var(--panel2)}
  .layer-active-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;box-shadow:0 0 5px var(--green)}
  .layer-swatch{width:10px;height:10px;border-radius:2px;flex-shrink:0}
  .layer-name{font-size:12px;font-weight:500;flex:1;line-height:1.3}
  .layer-badges{display:flex;gap:3px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;max-width:80px}
  .badge{font-family:var(--mono);font-size:8px;padding:2px 4px;border-radius:3px;line-height:1.4;white-space:nowrap}
  .badge.route{background:rgba(79,195,247,.15);color:var(--accent)}
  .badge.table{background:rgba(243,104,224,.15);color:var(--pink)}
  .badge.joined{background:rgba(67,224,155,.15);color:var(--green)}
  .badge.filtered{background:rgba(255,159,67,.15);color:var(--orange)}
  .layer-count{font-family:var(--mono);font-size:10px;color:var(--muted);flex-shrink:0;min-width:40px;text-align:right}

  /* Map */
  #map{flex:1;background:var(--bg);height:100%;width:100%}

  /* Loader */
  .loader{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(8,12,20,.88);z-index:2000;flex-direction:column;gap:14px}
  .loader.hidden{display:none}
  .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loader-text{font-family:var(--mono);font-size:11px;color:var(--muted);max-width:340px;text-align:center;line-height:1.6}
  .loader-sub{font-family:var(--mono);font-size:9px;color:rgba(90,122,154,.5);max-width:360px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .progress-bar{width:220px;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
  .progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s;width:0%}

  /* Info panel */
  .info-panel{position:absolute;bottom:20px;right:16px;width:290px;background:var(--panel);border:1px solid var(--border);border-radius:10px;z-index:1000;display:none;max-height:65vh;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.6);flex-direction:column}
  .info-panel.visible{display:flex}
  .info-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  .info-header h3{font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:.05em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px}
  .close-info{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:2px;flex-shrink:0}
  .close-info:hover{color:var(--text)}
  .info-body{overflow-y:auto;padding:10px 14px}
  .info-section-title{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:10px 0 6px;padding-bottom:4px;border-bottom:1px solid var(--border)}
  .info-section-title:first-child{margin-top:0}
  .info-row{display:flex;gap:8px;padding:4px 0;border-bottom:1px solid rgba(100,160,255,.04);font-size:11px}
  .info-row:last-child{border-bottom:none}
  .info-key{color:var(--muted);width:105px;flex-shrink:0;font-size:10px;word-break:break-word}
  .info-val{color:var(--text);word-break:break-word}
  .sl-chip{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;font-family:var(--mono);white-space:nowrap}
  .sl-bar{display:flex;gap:3px;margin:4px 0}
  .sl-bar-seg{flex:1;border-radius:4px;padding:5px 4px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:default;position:relative}
  .sl-bar-period{font-family:var(--mono);font-size:9px;font-weight:600;opacity:0.75;letter-spacing:.05em}
  .sl-bar-label{font-size:9px;text-align:center;line-height:1.2;display:none}
  .sl-bar-seg:hover .sl-bar-label{display:block}
  .record-divider{border:none;border-top:1px dashed var(--border);margin:5px 0}

  /* Transit route cards */
  .transit-cards{display:flex;flex-direction:column;gap:6px;margin-top:2px}
  .transit-group-label{display:flex;align-items:center;gap:6px;margin:10px 0 5px}
  .transit-group-label:first-child{margin-top:2px}
  .tgl-pill{font-family:var(--mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase;padding:2px 7px;border-radius:3px;font-weight:600}
  .tgl-line{flex:1;height:1px;background:var(--border)}
  .transit-card{background:var(--panel2);border:1px solid var(--border);border-radius:6px;padding:8px 10px;display:flex;flex-direction:column;gap:3px;align-items:flex-start}
  .transit-card-route{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--text);line-height:1.3}
  .transit-card-agency{font-size:10px;color:var(--muted)}
  .transit-card-header{display:flex;align-items:center;gap:8px}
  .route-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-family:var(--mono);font-size:11px;font-weight:600;line-height:1.5;cursor:default;white-space:nowrap}
  #agency-tooltip{position:fixed;background:#1a2538;color:#dce8f5;font-family:var(--sans);font-size:10px;font-weight:400;padding:3px 8px;border-radius:4px;white-space:nowrap;border:1px solid rgba(100,160,255,0.2);pointer-events:none;z-index:99999;display:none;}
  .transit-card-name{font-size:11px;color:var(--text);line-height:1.3}

  /* Leaflet overrides */
  .leaflet-popup-content-wrapper{background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:8px;font-family:var(--sans);font-size:12px}
  .leaflet-popup-tip{background:var(--panel)}
  .leaflet-control-zoom a{background:var(--panel)!important;color:var(--text)!important;border-color:var(--border)!important}
  .leaflet-control-zoom a:hover{background:var(--panel2)!important}
  .leaflet-control-attribution{display:none}
</style>
</head>
<body>

<header>
  <span class="wordmark">Transit Network</span>
  <div class="divider"></div>
  <span class="feed-label">Seattle_CSA_Transit_Network / FeatureServer</span>
  <div class="status-pill loading" id="statusPill">
    <div class="dot"></div>
    <span id="statusText">Connecting…</span>
  </div>
</header>

<div class="main" style="position:relative;">

  <div class="sidebar">
    <div class="sidebar-section">
      <div class="section-label">Statistics</div>
      <div class="stats-grid">
        <div class="stat-box"><div class="stat-val" id="statRoutes">—</div><div class="stat-label">Routes</div></div>
      </div>
    </div>

    <div class="sidebar-section" style="padding-bottom:6px;">
      <div class="section-label">Layers</div>
    </div>
    <div class="layers-list" id="layersList">
      <div style="padding:20px 16px;color:var(--muted);font-size:12px;">Discovering layers…</div>
    </div>
  </div>

  <div style="flex:1;position:relative;display:flex;flex-direction:column;min-height:0;">
    <div id="map"></div>

    <div class="loader" id="loader">
      <div class="spinner"></div>
      <div class="loader-text" id="loaderText">Fetching feed metadata…</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="loader-sub" id="loaderSub"></div>
    </div>

    <div class="info-panel" id="infoPanel">
      <div class="info-header">
        <h3 id="infoPanelTitle">Feature Properties</h3>
        <button class="close-info" id="closeInfo">✕</button>
      </div>
      <div class="info-body" id="infoContent"></div>
    </div>
  </div>
</div>

<div id="agency-tooltip"></div>

<script>
// Global agency tooltip
const agencyTooltip = document.getElementById('agency-tooltip');
document.addEventListener('mouseover', e => {
  const badge = e.target.closest('.route-badge');
  if (badge && badge.dataset.agency) {
    agencyTooltip.textContent = badge.dataset.agency;
    agencyTooltip.style.display = 'block';
  }
});
document.addEventListener('mousemove', e => {
  if (agencyTooltip.style.display === 'block') {
    agencyTooltip.style.left = (e.clientX + 12) + 'px';
    agencyTooltip.style.top  = (e.clientY - 28) + 'px';
  }
});
document.addEventListener('mouseout', e => {
  if (e.target.closest('.route-badge')) {
    agencyTooltip.style.display = 'none';
  }
});

const BASE = 'https://services7.arcgis.com/m6uLpqj7MgjPU371/arcgis/rest/services/Seattle_CSA_Transit_Network/FeatureServer';

// Layer classifier — spatial route layers only
const isRoute = n => /route/i.test(n) && !/table/i.test(n) && !/metro/i.test(n) && !/attribute/i.test(n);

// ── Coded domain lookups ─────────────────────────────────────────────────────
const DOMAINS = {
  ServiceLevel_v2: {
    100:'Light Rail',                                 101:'Arterial Rapid Transit (RapidRide/SWIFT/STREAM/STRIDE)',
    102:'Arterial Rapid Transit (RapidRide Candidate)',104:'Frequent (10-15 min)',
    105:'Very Frequent (<12 min)',
    106:'Frequent (≤15 min)',                         107:'Partial Frequent (15-30 min)',
    108:'Regular (30-40 min)',                        109:'Regular (40-60 min)',
    113:'Limited (60+ min)',
    116:'Peak Only',                                  199:'Dial-A-Ride Transit (DART)',
    207:'Regular (20-30 min)',                        297:'Limited Trips Only',
    298:'Weekend Service Only',                       299:'Snow Route Only',
    998:'No Service Currently',                       999:'No Service'
  },
  TrolleyWire: {
    0:'No', 1:'Yes', 2:'Yes - No scheduled service', 3:'Under Construction', 4:'Planned'
  },
  TransitROW: {
    1:'None',
    2:'Time Restricted Bus-only / BAT Lane',
    3:'Managed Lane (HOV or Toll Lane)',
    4:'All-day Transit-Only / BAT Lane',
    5:'Freight and Bus (FAB) Lane',
    6:'Dedicated Transit Only Lane (Busway / At-Grade Rail)',
    7:'Grade-Separated Light Rail',
    9:'Transit Priority Lane Under Construction'
  },
  YesNo:   { 0:'No', 1:'Yes' },
  ServiceType: {
    1:'Heavy Rail',              2:'Light Rail',
    3:'Commuter/Regional Rail',  4:'Arterial Rapid Bus Transit',
    5:'Freeway Rapid Bus Transit',6:'Local Service',
    7:'Regional Express',        8:'Peak Commuter Service',
    9:'Streetcar',               999:'No Service'
  },
  SDOT_FTN: {
    0:'City Center',    6:'Frequent: Better than 10 min',
    10:'Frequent: 10 min', 15:'Frequent: 15 min',
    998:'Other Transit', 999:'Undefined',
    1000:'Not Serviced', 9999:'Outside Seattle'
  },
  Agency: {
    ST:'Sound Transit',    KM:'King County Metro',
    CT:'Community Transit',PT:'Pierce Transit',
    IT:'Island Transit',   KT:'Kitsap Transit',
    ET:'Everett Transit',  SkT:'Skagit Transit',
    OT:'Intercity Transit'
  },
  WeekendSchedule: { 0:'Same as weekday', 1:'Reduced', 2:'None' }
};

// ── Service Level color map ───────────────────────────────────────────────────
const SL_META = {
  100: { cat:'Rail infrastructure',       bg:'#7F77DD', text:'#26215C' },
  104: { cat:'High frequency',            bg:'#9FE1CB', text:'#085041' },
  105: { cat:'High frequency',            bg:'#1D9E75', text:'#04342C' },
  106: { cat:'High frequency',            bg:'#5DCAA5', text:'#04342C' },
  107: { cat:'Moderate frequency',        bg:'#BA7517', text:'#412402' },
  207: { cat:'Moderate frequency',        bg:'#EF9F27', text:'#412402' },
  108: { cat:'Moderate frequency',        bg:'#FAC775', text:'#412402' },
  109: { cat:'Low frequency',             bg:'#D85A30', text:'#4A1B0C' },
  113: { cat:'Low frequency',             bg:'#F0997B', text:'#4A1B0C' },
  116: { cat:'Limited / special',         bg:'#E24B4A', text:'#501313' },
  297: { cat:'Limited / special',         bg:'#F7C1C1', text:'#501313' },
  298: { cat:'Conditional / inactive',    bg:'#888780', text:'#2C2C2A' },
  299: { cat:'Conditional / inactive',    bg:'#B4B2A9', text:'#2C2C2A' },
  199: { cat:'Demand-responsive',         bg:'#534AB7', text:'#26215C' },
};

// ── Agency color map ─────────────────────────────────────────────────────────
const AGENCY_COLORS = {
  ST:  { bg:'#1B4B8A', text:'#ffffff', name:'Sound Transit' },
  KM:  { bg:'#005C99', text:'#ffffff', name:'King County Metro' },
  CT:  { bg:'#006747', text:'#ffffff', name:'Community Transit' },
  PT:  { bg:'#D4002A', text:'#ffffff', name:'Pierce Transit' },
  IT:  { bg:'#F5A800', text:'#3a2800', name:'Island Transit' },
  KT:  { bg:'#5B2D8E', text:'#ffffff', name:'Kitsap Transit' },
  ET:  { bg:'#E87722', text:'#ffffff', name:'Everett Transit' },
  SkT: { bg:'#4C9B3F', text:'#ffffff', name:'Skagit Transit' },
  OT:  { bg:'#7B5EA7', text:'#ffffff', name:'Intercity Transit' },
};

// Short route label for badge display — extracts just the route identifier



// Field name → domain key
const FIELD_DOMAIN = {
  ServiceLevel:        'ServiceLevel_v2',
  ServiceLevel_AMPeak: 'ServiceLevel_v2',
  ServiceLevel_PMPeak: 'ServiceLevel_v2',
  ServiceLevel_2027:   'ServiceLevel_v2',
  ServiceLevel_2032:   'ServiceLevel_v2',
  ServiceLevel_2039:   'ServiceLevel_v2',
  ServiceLevel_2050:   'ServiceLevel_v2',
  Electrified:         'TrolleyWire',
  TransitROW:          'TransitROW',
  Stops:               'YesNo',
  ServiceType:         'ServiceType',
  SeattleFTN:          'SDOT_FTN',
  Agency:              'Agency',
  WeekendSchedule:     'WeekendSchedule'
};

// Fields to show in the info panel (API order preserved)
const DISPLAY_FIELDS = [
  'TransitROW',
];

const DISPLAY_FIELDS_TRANSIT = [
   'Route',
   'ServiceLevel'
];
function decodeDomain(field, value) {
  if (value === null || value === undefined || value === '') return null;
  const domain = DOMAINS[FIELD_DOMAIN[field]];
  if (!domain) return value;
  return domain[value] ?? value;
}

const COLORS = ['#4fc3f7','#43e09b','#ff9f43','#f368e0','#ffd32a','#ff6b6b','#a55eea','#00cec9'];

// ── Leaflet ──────────────────────────────────────────────────────────────────
const map = L.map('map',{center:[47.6062,-122.3321],zoom:13});
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 19,
  attribution: 'Esri World Imagery'
}).addTo(map);

let layerGroups = {};
let stats = { routes:0};

// ── UI helpers ───────────────────────────────────────────────────────────────
const $  = id => document.getElementById(id);
const setStatus = (cls,txt) => { $('statusPill').className='status-pill '+cls; $('statusText').textContent=txt; };
const setLoader = (vis,txt='',sub='',pct=null) => {
  $('loader').className = vis ? 'loader' : 'loader hidden';
  $('loaderText').textContent = txt;
  $('loaderSub').textContent  = sub;
  if (pct!==null) $('progressFill').style.width = pct+'%';
};
const updateStats = () => {
  $('statRoutes').textContent   = stats.routes.toLocaleString();
};

function formatVal(v) {
  if (typeof v === 'number' && v > 1e12) {
    const d = new Date(v);
    return isNaN(d) ? v : d.toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});
  }
  return v==null ? '—' : String(v);
}

const FIELD_ALIAS = {
  SegmentName:         'Segment Name',
  ServiceLevel:        'Best Daytime Service Level',
  ServiceLevel_AMPeak: 'Best AM Peak Service Level',
  ServiceLevel_PMPeak: 'Best PM Peak Service Level',
  ServiceLevel_2027:   '2027 Service Level',
  ServiceLevel_2032:   '2032 Service Level',
  ServiceLevel_2039:   '2039 Service Level',
  ServiceLevel_2050:   '2050 Service Level',
  Electrified:         'Trolley Service',
  TransitROW:          'Transit ROW',
  SeattleFTN:          'Seattle Frequent Transit Network'
};

function slBarSeg(period, val) {
  const src = SL_META[val] ?? SL_COLOR_MAP[val];
  const bg  = src ? src.bg   : 'rgba(100,160,255,0.08)';
  const col = src ? src.text : 'var(--muted)';
  const label = val != null ? (decodeDomain('ServiceLevel', val) ?? '—') : '—';
  return '<div class="sl-bar-seg" style="background:' + bg + ';color:' + col + '">'
    + '<span class="sl-bar-period">' + period + '</span>'
    + '<span class="sl-bar-label">' + label + '</span>'
    + '</div>';
}

function renderRows(attrs) {
  const amVal = attrs.ServiceLevel_AMPeak;
  const mdVal = attrs.ServiceLevel;
  const pmVal = attrs.ServiceLevel_PMPeak;

  const hasBar = amVal != null || mdVal != null || pmVal != null;
  let out = '';

  if (hasBar) {
    const amEffective = (amVal > 997) ? null : amVal;
    const mdEffective = (mdVal === 116 || mdVal > 997) ? null : (mdVal === 104) ? 106 : mdVal;
    const pmEffective = (pmVal > 997) ? null : pmVal;
    out += '<div class="info-section-title" style="margin-top:0">Service Level</div>';
    out += '<div class="sl-bar">'
      + slBarSeg('AM', amEffective)
      + slBarSeg('MD', mdEffective)
      + slBarSeg('PM', pmEffective)
      + '</div>';
  }

  out += Object.entries(attrs)
    .filter(([k, v]) => DISPLAY_FIELDS.includes(k) && v !== null && v !== '' && v !== undefined)
    .map(([k, v]) => {
      const alias   = FIELD_ALIAS[k] ?? k;
      const display = decodeDomain(k, v);
      return '<div class="info-row"><span class="info-key">' + alias + '</span><span class="info-val">' + formatVal(display) + '</span></div>';
    })
    .join('');

  return out;
}

function argbToCss(val) {
  if (val == null) return null;
  if (typeof val === 'string') return val; // already CSS
  const r = (val >> 16) & 0xff;
  const g = (val >> 8)  & 0xff;
  const b =  val        & 0xff;
  return `rgb(${r},${g},${b})`;
}

function showInfoPanel(layerName, props) {
  $('infoPanelTitle').textContent = layerName;

  const gid = props?.GeoID ?? props?.geoid ?? props?.GEOID;
  const tRows = (gid != null ? transitLookup[gid] : null) || [];

  let html = Object.keys(props).length
    ? renderRows(props)
    : '<div style="color:var(--muted);font-size:11px;">No attributes</div>';

  const activeRows = tRows;

  if (activeRows.length) {
    const uniqueRouteCount = new Set(activeRows.map(r => r.Route ?? r.route)).size;
    html += `<div class="info-section-title">Transit Routes (${uniqueRouteCount})</div>`;
    html += `<div class="transit-cards">`;

    // Group by ServiceLevel, sorted ascending by numeric value (nulls last)
    const groups = {};
    activeRows.forEach(r => {
      const slKey = r.ServiceLevel != null ? r.ServiceLevel : '__null__';
      if (!groups[slKey]) groups[slKey] = [];
      groups[slKey].push(r);
    });
    const sortedKeys = Object.keys(groups).sort((a, b) => {
      if (a === '__null__') return 1;
      if (b === '__null__') return -1;
      return Number(a) - Number(b);
    });

    sortedKeys.forEach(slKey => {
      const slLabel = slKey === '__null__' ? 'Unknown' : (decodeDomain('ServiceLevel', Number(slKey)) ?? slKey);
      const src = SL_META[Number(slKey)] ?? SL_COLOR_MAP[Number(slKey)];
      const pillStyle = src ? 'background:' + src.bg + ';color:' + src.text : 'background:var(--panel2);color:var(--muted)';
      html += `<div class="transit-group-label"><span class="tgl-pill" style="${pillStyle}">${slLabel}</span><span class="tgl-line"></span></div>`;
      // Deduplicate by route number within each ServiceLevel group
      const seenRoutes = new Set();
      const uniqueRoutes = groups[slKey].filter(r => {
        const key = r.Route ?? r.route;
        if (seenRoutes.has(key)) return false;
        seenRoutes.add(key);
        return true;
      });

      // Render all badges in one wrapping flex row per service level group
      html += '<div class="transit-card"><div style="display:flex;flex-wrap:wrap;gap:5px;">';
      uniqueRoutes.forEach(r => {
        const routeNum   = r.Route;
        const RtAttrKey  = r.Segment_RouteBound;
        const info       = routeLookup[RtAttrKey] ?? {};
        const agency     = info.agency;
        const shortLabel = info.short ?? String(routeNum);
        const ac         = AGENCY_COLORS[agency] ?? { bg:'#2a3a52', text:'#dce8f5', name: agency ?? '' };
        const badge_bg   = info.Color_RouteBadge ?? ac.bg;
        const badge_text = info.Color_RouteText ?? ac.text;
        const badgeStyle = 'background:' + badge_bg + ';color:' + badge_text;
        const agency_full = decodeDomain('Agency', agency) ?? agency ?? '';
        html += '<span class="route-badge" style="' + badgeStyle + '" data-agency="' + agency_full + '">'
          + shortLabel
          + '</span>';
      });
      html += '</div></div>';
    });

    html += `</div>`;
  }

  $('infoContent').innerHTML = html;
  $('infoPanel').classList.add('visible');
}

$('closeInfo').addEventListener('click', () => $('infoPanel').classList.remove('visible'));

// ── Data helpers ─────────────────────────────────────────────────────────────
async function fetchAll(layerId, where) {
  const PAGE = 1000;
  let offset = 0, all = [], exceeded = true;
  while (exceeded) {
    const p = new URLSearchParams({ where, outFields:'*', outSR:'4326', resultOffset:offset, resultRecordCount:PAGE, f:'json' });
    const d = await (await fetch(`${BASE}/${layerId}/query?${p}`)).json();
    if (d.error) throw new Error(d.error.message);
    all = all.concat(d.features || []);
    exceeded = d.exceededTransferLimit === true && (d.features||[]).length > 0;
    offset += PAGE;
  }
  return all;
}

async function fetchCount(layerId, where='1=1') {
  const p = new URLSearchParams({ where, returnCountOnly:'true', f:'json' });
  const d = await (await fetch(`${BASE}/${layerId}/query?${p}`)).json();
  return d.count ?? 0;
}

function toGeoJSON(feature, geomType) {
  if (!feature.geometry) return null;
  const g = feature.geometry;
  let geometry;
  if      (geomType.includes('Point'))    geometry = { type:'Point',            coordinates:[g.x, g.y] };
  else if (geomType.includes('Polyline')) geometry = { type:'MultiLineString',   coordinates: g.paths||[] };
  else if (geomType.includes('Polygon'))  geometry = { type:'MultiPolygon',      coordinates: g.rings ? [g.rings] : [] };
  else return null;
  return { type:'Feature', geometry, properties:feature.attributes };
}

// ── Layer sidebar ────────────────────────────────────────────────────────────
function buildLayerUI(defs) {
  const container = $('layersList');
  container.innerHTML = '';
  defs.forEach(def => {
    const item = document.createElement('div');
    item.className = 'layer-item active';
    const badges = def.badges.map(b=>`<span class="badge ${b.cls}">${b.label}</span>`).join('');
    item.innerHTML = `
      <div class="layer-active-dot"></div>
      <div class="layer-swatch" style="background:${def.color}"></div>
      <div class="layer-name">${def.name}</div>
      <div class="layer-badges">${badges}</div>
      <div class="layer-count" id="cnt-${def.id}">…</div>`;
    container.appendChild(item);
  });
}

// ── Transit table lookup (populated after routes load) ───────────────────────
let transitLookup = {}; // GeoID → array of row attributes
let SL_COLOR_MAP = {};      // ServiceLevel value → {bg, text} from ArcGIS renderer
let routeLookup = {}; // Route_Bound / Segment_RouteBound → {agency, short}

// ── Main ─────────────────────────────────────────────────────────────────────
async function init() {
  try {
    setStatus('loading','Connecting…');
    setLoader(true,'Fetching FeatureServer metadata…','',5);

    // 1. Discover spatial route layers + transit table
    const meta = await (await fetch(`${BASE}?f=json`)).json();
    if (meta.error) throw new Error(meta.error.message);

    const routeLayers   = (meta.layers||[]).filter(l => isRoute(l.name));
    const transitTables   = (meta.tables||[]).filter(l => /transit_table$/i.test(l.name));
    const routeAttrTables = (meta.tables||[]).filter(l => /routeatt/i.test(l.name));
    console.log('[route_attr] tables found:', routeAttrTables.map(l=>l.name));

    if (!routeLayers.length) throw new Error('No Route layers found. Available: ' + (meta.layers||[]).map(l=>l.name).join(', '));

    const spatialDefs = [...routeLayers].reverse().map((l,i) => ({
      ...l, color:COLORS[i % COLORS.length],
      badges:[{cls:'route',label:'ROUTE'}]
    }));

    buildLayerUI(spatialDefs);

    // Date string (shared by route + table filters)
    const TODAY = new Date();
    const pad = n => String(n).padStart(2,'0');
    const todayStr = `${TODAY.getFullYear()}-${pad(TODAY.getMonth()+1)}-${pad(TODAY.getDate())}`;
    const dateFilter =
      `(Segment_StartDate IS NULL OR Segment_StartDate <= DATE '${todayStr}') AND ` +
      `(Segment_EndDate IS NULL OR Segment_EndDate >= DATE '${todayStr}') AND ` +
      `ServiceLevel NOT IN (298, 299, 998, 999)`;
    const tableFilter =
      `(StartDate IS NULL OR StartDate <= DATE '${todayStr}') AND ` +
      `(EndDate IS NULL OR EndDate >= DATE '${todayStr}') AND ` +
      `ServiceLevel NOT IN (298, 299, 998, 999)`;

    // 2. Load each route layer, collect GeoIDs as we go
    const routeGeoIDs = new Set();

    for (let i=0; i<spatialDefs.length; i++) {
      const def = spatialDefs[i];
      const pct = 10 + Math.round(((i+1)/spatialDefs.length)*70);
      setLoader(true, `Loading "${def.name}"…`, 'Fetching features…', pct);

      try {
        const info     = await (await fetch(`${BASE}/${def.id}?f=json`)).json();
        const geomType = info.geometryType || 'esriGeometryPolyline';

        // Build color lookup from renderer
        const renderer = info.drawingInfo?.renderer;
        const colorLookup = {};
        let defaultColor = '#4fc3f7';

        if (renderer?.type === 'uniqueValue') {
          (renderer.uniqueValueInfos || []).forEach(uvi => {
            const sym = uvi.symbol;
            if (!sym) return;
            const [r,g,b,a] = sym.color || [79,195,247,255];
            const bg = `rgba(${r},${g},${b},${(a/255).toFixed(2)})`;
            colorLookup[uvi.value] = bg;
            // Populate global map on first layer — derive readable text color
            const brightness = 0.299*r + 0.587*g + 0.114*b;
            SL_COLOR_MAP[uvi.value] = { bg, text: brightness > 140 ? '#1a1a1a' : '#ffffff' };
          });
          if (renderer.defaultSymbol?.color) {
            const [r,g,b,a] = renderer.defaultSymbol.color;
            defaultColor = `rgba(${r},${g},${b},${(a/255).toFixed(2)})`;
          }
        }

        function featureColor(props) {
          const val = props?.ServiceLevel;
          if (val === null || val === undefined) return defaultColor;
          return colorLookup[val] ?? colorLookup[String(val)] ?? defaultColor;
        }

        const [totalCnt, features] = await Promise.all([
          fetchCount(def.id),
          fetchAll(def.id, dateFilter)
        ]);

        stats.routes   += features.length;
        updateStats();
        $(`cnt-${def.id}`).textContent = features.length.toLocaleString();

        // Collect GeoIDs from loaded route features (Stage 2 prep)
        features.forEach(f => {
          const gid = f.attributes?.GeoID ?? f.attributes?.geoid ?? f.attributes?.GEOID;
          if (gid != null) routeGeoIDs.add(gid);
        });

        const geojsonFeatures = features.map(f => toGeoJSON(f, geomType)).filter(Boolean);

        const group = L.geoJSON({ type:'FeatureCollection', features:geojsonFeatures }, {
          style: feature => {
            const c = featureColor(feature.properties);
            return { color:c, weight:2, opacity:0.9, fillColor:c, fillOpacity:0.2, offset:0.8 };
          },
          pointToLayer: (feature, latlng) => {
            const c = featureColor(feature.properties);
            return L.circleMarker(latlng, {
              radius:5, fillColor:c, color:'#fff', weight:1, opacity:1, fillOpacity:0.9
            });
          },
          onEachFeature: (feature, lyr) => {
            lyr.on('click', () => showInfoPanel(def.name, feature.properties || {}));
            lyr.on('mouseover', function() { this.setStyle({weight:4, opacity:1}); });
            lyr.on('mouseout',  function() { group.resetStyle(this); });
          }
        });

        layerGroups[def.id] = group;
        group.addTo(map);

      } catch(err) {
        console.error(`Layer "${def.name}" failed:`, err);
        const el = $(`cnt-${def.id}`);
        if (el) el.textContent = 'error';
      }
    }

    // 3. Fetch Transit_Table — Stage 1 (server-side date filter)
    if (transitTables.length) {
      const tbl = transitTables[0];
      setLoader(true, `Loading "${tbl.name}"…`, `Stage 1: date filter`, 82);

      try {
        const rawRows = await fetchAll(tbl.id, tableFilter);
        console.log(`[transit_table] Stage 1 (date filtered): ${rawRows.length} records`);

        // Stage 2 — in-memory filter to only GeoIDs present in loaded routes
        const filtered = rawRows.filter(f => {
          const gid = f.attributes?.GeoID ?? f.attributes?.geoid ?? f.attributes?.GEOID;
          return gid != null && routeGeoIDs.has(gid);
        });
        console.log(`[transit_table] Stage 2 (GeoID match): ${filtered.length} records`);

        // Build lookup: GeoID → [rows]
        filtered.forEach(f => {
          const a   = f.attributes;
          const gid = a?.GeoID ?? a?.geoid ?? a?.GEOID;
          if (gid == null) return;
          if (!transitLookup[gid]) transitLookup[gid] = [];
          transitLookup[gid].push(a);
        });

        console.log(`[transit_table] lookup built for ${Object.keys(transitLookup).length} unique GeoIDs`);
        const sampleRow = filtered[0]?.attributes;
        if (sampleRow) console.log('[transit_table] sample row fields:', Object.keys(sampleRow), '| Agency value:', sampleRow.Agency ?? sampleRow.agency ?? 'MISSING');

      } catch(err) {
        console.error('Transit_Table failed:', err);
      }
    }

    // 4. Fetch RouteAttribute table — build Route → Agency lookup
    if (routeAttrTables.length) {
      const tbl = routeAttrTables[0];
      setLoader(true, `Loading "${tbl.name}"…`, 'Building agency lookup', 92);
      try {
        const rows = await fetchAll(tbl.id, '1=1');
        rows.forEach(f => {
          const a      = f.attributes;
          const RtAttrKey = a.Route_Bound
		  const Color_RouteBadge = a.RouteColor ? '#' + a.RouteColor : null;
		  const Color_RouteText  = a.TextColor  ? '#' + a.TextColor  : null;
          const agency = a.Agency
          const short  = a.RouteShort
          if (RtAttrKey == null) return;
          routeLookup[RtAttrKey] = { agency, short, Color_RouteBadge, Color_RouteText};
        });
        console.log(`[route_attr] lookup built for ${Object.keys(routeLookup).length} routes`);
        const sampleKey = Object.keys(routeLookup)[0];
        console.log('[route_attr] sample key:', sampleKey, '| value:', routeLookup[sampleKey]);
      } catch(err) {
        console.error('RouteAttribute table failed:', err);
      }
    }

    setLoader(false);
    setStatus('', `${stats.routes.toLocaleString()} routes loaded`);
    const dot = $('statusPill').querySelector('.dot');
    if (dot) dot.style.animation = 'none';

  } catch(err) {
    setLoader(false);
    setStatus('error','Load failed');
    $('layersList').innerHTML = `<div style="padding:16px;color:var(--red);font-size:12px;">${err.message}</div>`;
    console.error(err);
  }
}

init();
</script>
