<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Western Washington Transit Explorer (Beta version)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- ✦ ArcGIS: SDK CSS (dark theme) replaces leaflet.css -->
<link rel="stylesheet" href="https://js.arcgis.com/4.30/esri/themes/dark/main.css">
<script src="https://js.arcgis.com/4.30/"></script>

<style>
  :root {
    --bg:#080c14; --panel:#0e1520; --panel2:#141d2e;
    --border:rgba(100,160,255,0.12);
    --accent:#4fc3f7; --green:#43e09b; --orange:#ff9f43;
    --pink:#f368e0; --yellow:#ffd32a; --red:#ff6b6b; --purple:#a55eea;
    --text:#dce8f5; --muted:#5a7a9a;
    --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{font-family:var(--sans);background:var(--bg);color:var(--text);display:flex;flex-direction:column}

  header{display:flex;align-items:center;gap:14px;padding:0 18px;height:52px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;z-index:1000}
  .wordmark{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);white-space:nowrap}
  .divider{width:1px;height:20px;background:var(--border);flex-shrink:0}
  .feed-label{font-family:var(--mono);font-size:10px;color:var(--muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sdk-badge{font-family:var(--mono);font-size:9px;letter-spacing:.1em;color:var(--orange);border:1px solid rgba(255,159,67,.3);padding:2px 8px;border-radius:3px;flex-shrink:0}
  .status-pill{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;background:rgba(67,224,155,.1);border:1px solid rgba(67,224,155,.25);font-family:var(--mono);font-size:10px;color:var(--green);flex-shrink:0;transition:all .3s}
  .status-pill.loading{background:rgba(79,195,247,.1);border-color:rgba(79,195,247,.25);color:var(--accent)}
  .status-pill.error{background:rgba(255,107,107,.1);border-color:rgba(255,107,107,.25);color:var(--red)}
  .dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  .main{display:flex;flex:1;overflow:hidden}

  .sidebar{width:290px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;z-index:500}
  .sidebar-section{padding:14px 16px;border-bottom:1px solid var(--border)}
  .section-label{font-family:var(--mono);font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}

  /* ✦ ArcGIS: container is #viewDiv instead of #map */
  #viewDiv{flex:1;background:var(--bg);height:100%;width:100%}

  .info-panel{position:absolute;bottom:20px;right:16px;width:290px;background:var(--panel);border:1px solid var(--border);border-radius:10px;z-index:1000;display:none;max-height:65vh;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.6);flex-direction:column}
  .info-panel.visible{display:flex}
  .info-header{
    padding:8px 12px;
    padding-right:32px; /* space for close button */
    border-bottom:1px solid var(--border);
    position:relative;
    flex-shrink:0;
  }
  .info-header h3{
    font-family:var(--mono);font-size:10px;color:var(--accent);
    letter-spacing:.05em;text-align:left;
    overflow:hidden;text-overflow:ellipsis;
    line-height:1.4;
    max-height:2.8em; /* ~2 lines */
  }
  .close-info,.back-btn{
    background:none;border:none;color:var(--muted);
    cursor:pointer;font-size:14px;padding:6px;
    display:flex;align-items:center;justify-content:center;
    position:absolute;
    top:50%;
    transform:translateY(-50%);
  }
  .back-btn{display:none;left:4px}  /* hidden on desktop */
  .close-info{right:4px}
  .close-info:hover,.back-btn:hover{color:var(--text)}
  .info-body{overflow-y:auto;padding:10px 14px}
  .info-section-title{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:10px 0 6px;padding-bottom:4px;border-bottom:1px solid var(--border)}
  .info-section-title:first-child{margin-top:0}
  .info-row{display:flex;gap:8px;padding:4px 0;border-bottom:1px solid rgba(100,160,255,.04);font-size:11px}
  .info-row:last-child{border-bottom:none}
  .info-key{color:var(--muted);width:105px;flex-shrink:0;font-size:10px}
  .info-val{color:var(--text);word-break:break-word}
  .sl-bar{display:flex;gap:3px;margin:4px 0}
  .sl-bar-seg{flex:1;border-radius:4px;padding:5px 4px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:default;position:relative}
  .sl-bar-period{font-family:var(--mono);font-size:9px;font-weight:600;opacity:.75;letter-spacing:.05em}
  .sl-bar-label{font-size:9px;text-align:center;line-height:1.2;display:none}
  .sl-bar-seg:hover .sl-bar-label{display:block}
  .transit-cards{display:flex;flex-direction:column;gap:6px;margin-top:2px}
  .transit-group-label{display:flex;align-items:center;gap:6px;margin:10px 0 5px}
  .transit-group-label:first-child{margin-top:2px}
  .tgl-pill{font-family:var(--mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase;padding:2px 7px;border-radius:3px;font-weight:600}
  .tgl-line{flex:1;height:1px;background:var(--border)}
  .transit-card{background:var(--panel2);border:1px solid var(--border);border-radius:6px;padding:8px 10px}
  .route-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-family:var(--mono);font-size:11px;font-weight:600;line-height:1.5;white-space:nowrap}
  .loading-routes{font-family:var(--mono);font-size:10px;color:var(--muted);padding:8px 0;font-style:italic}

  #agency-tooltip{position:fixed;background:#1a2538;color:#dce8f5;font-family:var(--sans);font-size:10px;padding:3px 8px;border-radius:4px;white-space:nowrap;border:1px solid rgba(100,160,255,0.2);pointer-events:none;z-index:99999;display:none}

  .legend-item{display:flex;align-items:center;gap:10px;padding:7px 16px;font-size:12px}
  .legend-swatch{width:24px;height:4px;border-radius:2px;flex-shrink:0}
  .legend-label{color:var(--text);flex:1;line-height:1.3}

  .mode-switcher{display:flex;flex-direction:column;gap:4px;margin-top:8px}
  .period-switcher{display:flex;gap:4px;margin-top:8px}
  .mode-btn,.period-btn{flex:1;padding:6px 8px;border-radius:4px;border:1px solid var(--border);background:var(--panel2);color:var(--muted);font-family:var(--mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .15s;text-align:left}
  .mode-btn:hover,.period-btn:hover{color:var(--text);border-color:rgba(100,160,255,0.3)}
  .mode-btn.active,.period-btn.active{background:rgba(79,195,247,.15);border-color:rgba(79,195,247,.4);color:var(--accent)}

  /* ✦ ArcGIS: Override SDK widget styles to match dark theme */
  .esri-ui-corner{background:transparent}
  .esri-component{background:var(--panel) !important;border:1px solid var(--border) !important;border-radius:6px !important}
  .esri-zoom .esri-widget--button{background:var(--panel) !important;color:var(--text) !important;border-color:var(--border) !important}
  .esri-zoom .esri-widget--button:hover{background:var(--panel2) !important}
  .esri-attribution{display:none !important}
  /* Move zoom controls to avoid overlap with sidebar */
  .esri-ui-top-left{left:0 !important;top:0 !important}

  @media (max-width: 768px) {
    .main{flex-direction:column}
    .sidebar{width:100%;height:280px;flex-shrink:0;border-right:none;border-top:1px solid var(--border);order:2}
    #viewDiv{order:1}
    /* On mobile, info panel replaces the sidebar rather than floating above it */
    .info-panel{
      position:static;           /* pulled out of absolute flow */
      width:100%;
      height:280px;
      max-height:280px;
      border-radius:0;
      border-left:none;border-right:none;border-bottom:none;
      box-shadow:none;
      order:2;                   /* sits in the same slot as the sidebar */
      display:none;              /* hidden until .visible */
      flex-shrink:0;
    }
    .info-panel.visible{display:flex}
    /* Hide sidebar when info panel is shown on mobile */
    .sidebar.hidden-mobile{display:none}
    /* Back button visible only on mobile — desktop keeps it hidden */
    .back-btn{display:flex;visibility:visible;left:8px;right:auto}
    /* Adjust title padding on mobile to accommodate back button on left */
    .info-header h3{padding-left:24px;padding-right:24px}

    /* Legend: two-column grid so all items are visible without scrolling.
       Each column is at least 140px wide; the grid fills available width.
       Items stay compact — reduced padding and font to fit more per row. */
    #legendList{
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(140px, 1fr));
      overflow-y:auto;
      padding:4px 8px;
    }
    .legend-item{padding:5px 8px;font-size:11px;align-items:center}
    .legend-swatch{width:20px;flex-shrink:0}
  }
  /* ── Resizer ─────────────────────────────────────────────────────────────── */
  #resizer{
    flex-shrink:0;
    background:var(--panel);
    border:none;
    position:relative;
    z-index:600;
    /* Desktop: vertical strip between sidebar and map */
    width:8px;
    cursor:col-resize;
    border-left:1px solid var(--border);
    border-right:1px solid var(--border);
    transition:background .15s;
  }
  #resizer:hover, #resizer.dragging{ background:rgba(79,195,247,.15); }
  /* Grip dots centered in the handle */
  #resizer::before{
    content:'';
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    width:3px; height:24px;
    background:radial-gradient(circle, var(--muted) 1.5px, transparent 1.5px);
    background-size:3px 6px;
    opacity:.6;
  }
  @media (max-width: 768px) {
    #resizer{
      /* Mobile: horizontal strip between map and sidebar */
      width:100%; height:10px;
      cursor:row-resize;
      border-left:none; border-right:none;
      border-top:1px solid var(--border);
      border-bottom:1px solid var(--border);
      order:2; /* sits just above sidebar (same order, earlier in DOM) */
    }
    #resizer::before{
      width:24px; height:3px;
      background:radial-gradient(circle, var(--muted) 1.5px, transparent 1.5px);
      background-size:6px 3px;
    }
  }
</style>
</head>
<body>

<header>
  <span class="wordmark">Western Washington Transit Explorer</span>
  <div class="divider"></div>
  <span class="feed-label"></span>
  <span class="sdk-badge">ArcGIS JS SDK 4.30</span>
  <div class="status-pill loading" id="statusPill">
    <div class="dot"></div>
    <span id="statusText">Connecting…</span>
  </div>
</header>

<div class="main" style="position:relative">

  <div class="sidebar" id="sidebar">
    <div class="sidebar-section" style="padding-bottom:10px">
      <div class="section-label">Map View</div>
      <div class="mode-switcher" id="modeSwitcher">
        <button class="mode-btn active" data-mode="sl">Service Level</button>
        <button class="mode-btn" data-mode="trolley">Trolleybus Network</button>
        <button class="mode-btn" data-mode="row">Transit Right-of-way</button>
      </div>
      <div class="period-switcher" id="periodSwitcher">
        <button class="period-btn active" data-period="ServiceLevel">Daytime</button>
        <button class="period-btn" data-period="ServiceLevel_AMPeak">AM Peak</button>
        <button class="period-btn" data-period="ServiceLevel_Midday">Mid-day</button>
        <button class="period-btn" data-period="ServiceLevel_PMPeak">PM Peak</button>
      </div>
    </div>
    <div class="layers-list" id="legendList">
      <div style="padding:20px 16px;color:var(--muted);font-size:12px">Loading…</div>
    </div>
  </div>

  <div id="resizer"></div>

  <div style="flex:1;position:relative;display:flex;flex-direction:column;min-height:0">
    <!-- ✦ ArcGIS: MapView renders into this div instead of Leaflet's #map -->
    <div id="viewDiv"></div>

    <div class="info-panel" id="infoPanel">
      <div class="info-header">
        <button class="back-btn" id="backBtn">←</button>
        <h3 id="infoPanelTitle">Feature Properties</h3>
        <button class="close-info" id="closeInfo">✕</button>
      </div>
      <div class="info-body" id="infoContent"></div>
    </div>
  </div>
</div>

<div id="agency-tooltip"></div>

<script>


// ── Shared data constants (identical to Leaflet version) ──────────────────────

const BASE = 'https://services7.arcgis.com/m6uLpqj7MgjPU371/arcgis/rest/services/Western_Washington_Transit_Network/FeatureServer';

const SL_META = {
  100: { cat:'Rail infrastructure',  bg:'#FFE566', text:'#3D3000' },
  105: { cat:'High frequency',       bg:'#FF5FA3', text:'#4D0D28' },
  104: { cat:'High frequency',       bg:'#56B4E9', text:'#0A2D42' },
  106: { cat:'High frequency',       bg:'#56B4E9', text:'#0A2D42' },
  107: { cat:'Partial frequency',    bg:'#8BAA8C', text:'#3D2800' },
  206: { cat:'Partial frequency',    bg:'#8BAA8C', text:'#3D2800' },
  207: { cat:'Partial frequency',    bg:'#8BAA8C', text:'#3D2800' },
  108: { cat:'Regular',              bg:'#CC7722', text:'#3A1E00' },
  109: { cat:'Limited',              bg:'#994422', text:'#301200' },
  110: { cat:'Limited',              bg:'#994422', text:'#301200' },
  113: { cat:'Limited',              bg:'#994422', text:'#301200' },
  116: { cat:'Peak Only',            bg:'#773388', text:'#250D2C' },
  199: { cat:'Demand-responsive',    bg:'#9977CC', text:'#241545' },
  295: { cat:'No Regular Service',   bg:'#B2B2B2', text:'#250D2C' },
  299: { cat:'No Regular Service',   bg:'#B2B2B2', text:'#250D2C' },
  998: { cat:'No Regular Service',   bg:'#B2B2B2', text:'#250D2C' },
  999: { cat:'No Regular Service',   bg:'#B2B2B2', text:'#250D2C' },
};

const DOMAINS = {
  ServiceLevel_v2: {
    100:'Light Rail', 105:'Very Frequent (≤10 min)', 104:'Frequent (10-15 min)',
    106:'Frequent (15 min)', 107:'Partial Frequent (15-30 min)', 108:'Regular (30 min)',
    109:'Regular (>30 min)', 206:'Less Frequent (20 min)',207:'Regular (20-30 min)',
	113:'Limited (>60 min)', 116:'Peak Only', 199:'Dial-A-Ride Transit (DART)',
	299:"Snow Route Only", 998:'No Regular Service'
  },
  TrolleyWire: { 0:'Inactive', 1:'Active', 2:'Active - No scheduled service', 3:'Under Construction', 4:'Planned' },
  TransitROW: {
    1:'None', 2:'Time Restricted Bus-only / BAT Lane', 3:'Managed Lane (HOV or Toll Lane)',
    4:'All-day Transit-Only / BAT Lane', 5:'Freight and Bus (FAB) Lane',
    6:'Dedicated Transit Only Lane (Busway / At-Grade Rail)', 7:'Grade-Separated Light Rail',
    9:'Bus Lane Under Construction',10:'Bus Lane Planned'
  },
  Agency: {
    ST:'Sound Transit', KM:'King County Metro', CT:'Community Transit', PT:'Pierce Transit',
    IT:'Island Transit', KT:'Kitsap Transit', ET:'Everett Transit', SkT:'Skagit Transit', OT:'Intercity Transit'
  },
  ServiceType: {
    1:'Heavy Rail', 2:'Light Rail', 3:'Commuter/Regional Rail', 4:'Arterial Rapid Bus Transit',
    5:'Freeway Rapid Bus Transit', 6:'Local Service', 7:'Regional Express',
    8:'Peak Commuter Service', 9:'Streetcar', 999:'No Service'
  }
};

const AGENCY_COLORS = {
  ST: {bg:'#1B4B8A',text:'#fff'}, KM: {bg:'#005C99',text:'#fff'},
  CT: {bg:'#006747',text:'#fff'}, PT: {bg:'#D4002A',text:'#fff'},
  IT: {bg:'#F5A800',text:'#3a2800'}, KT: {bg:'#5B2D8E',text:'#fff'},
  ET: {bg:'#E87722',text:'#fff'}, SkT:{bg:'#4C9B3F',text:'#fff'}, OT: {bg:'#7B5EA7',text:'#fff'},
};


const DRAW_ORDER = {
	      SL1:   [100, 105, 104, 106, 107, 206, 207, 108, 109, 110, 113, 116, 199, 295, 299, 998, 999], // full list of SL code per Source Layer
       	  SL2:   [100, 105, 104, 107, 108, 109, 116, 199, 998], // Compressed list of SL for color and legend only
	  TROLLEY:   [1, 2, 3, 4, 0],
	  BUSLANE:   [7, 6, 5, 4, 2, 3, 9,10, 1],
};
const SL1_DRAW_ORDER = DRAW_ORDER['SL1'];
const SL2_DRAW_ORDER = DRAW_ORDER['SL2'];

function normalizeSL(val) {
  if (val == null) return val;
  const v = Number(val);
  if (v === 106) return 104; // → Frequent (10-15 min)
  if (v === 207 || v === 206) return 107; // → Regular (15-30 min)
  if (v === 113 || v === 110) return 109; // → Regular (>30 min)
  if (v === 998 || v === 999 || v === 299 || v === 295) return 998; //  → No Regular Service
  return v;
}

// ── Floating date filter ───────────────────────────────────────────────────────
// Single parameterized function covering all three former expressions.
// startField / endField differ between route layers and the transit table:
//   route layers  → DEF_EXPR_DATE('Segment_StartDate', 'Segment_EndDate')
//   transit table → DEF_EXPR_DATE('StartDate', 'EndDate')
//
// ServiceLevel 298/299/998/999 are no longer excluded here — the SL renderer's
// defaultSymbol renders them with a negligible (near-transparent) style instead.
function getTodayStr() {
  const d = new Date();
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
}

function DEF_EXPR_DATE(startField, endField) {
  const t = getTodayStr();
  return `(${startField} IS NULL OR ${startField} <= DATE '${t}') AND ` +
         `(${endField}   IS NULL OR ${endField}   >= DATE '${t}') AND ` +
		 `(SERVICELEVEL <> 999)`;
}

// ── Midnight refresh ───────────────────────────────────────────────────────────
function scheduleMidnightRefresh(getFeatureLayers, getTransitLayer) {
  const now  = new Date();
  const next = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
  setTimeout(() => {
    getFeatureLayers().forEach(fl => {
      fl.definitionExpression = DEF_EXPR_DATE('Segment_StartDate', 'Segment_EndDate');
    });
    const tl = getTransitLayer();
    if (tl) tl.definitionExpression = DEF_EXPR_DATE('StartDate', 'EndDate');
    scheduleMidnightRefresh(getFeatureLayers, getTransitLayer);
  }, next - now);
}

// ── UI helpers ────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const setStatus = (cls, txt) => {
  $('statusPill').className = 'status-pill ' + cls;
  $('statusText').textContent = txt;
};

// ── Agency tooltip (identical to original) ────────────────────────────────────
const agencyTooltip = $('agency-tooltip');
document.addEventListener('mouseover', e => {
  const b = e.target.closest('.route-badge');
  if (b?.dataset.agency) { agencyTooltip.textContent = b.dataset.agency; agencyTooltip.style.display = 'block'; }
});
document.addEventListener('mousemove', e => {
  if (agencyTooltip.style.display === 'block') {
    agencyTooltip.style.left = (e.clientX + 12) + 'px';
    agencyTooltip.style.top  = (e.clientY - 28) + 'px';
  }
});
document.addEventListener('mouseout', e => {
  if (e.target.closest('.route-badge')) agencyTooltip.style.display = 'none';
});

// ── Info panel helpers (mostly identical) ─────────────────────────────────────
function slBarSeg(period, val) {
  const nval = normalizeSL(val);
  const src  = SL_META[nval];
  const bg   = src ? src.bg   : 'rgba(100,160,255,0.08)';
  const col  = src ? src.text : 'var(--muted)';
  const label = val != null ? (DOMAINS.ServiceLevel_v2[val] ?? '—') : '—';
  return `<div class="sl-bar-seg" style="background:${bg};color:${col}">
    <span class="sl-bar-period">${period}</span>
    <span class="sl-bar-label">${label}</span>
  </div>`;
}

function renderAttrs(attrs) {
  const amVal = attrs.ServiceLevel_AMPeak, mdVal = attrs.ServiceLevel_Midday, pmVal = attrs.ServiceLevel_PMPeak;
  const hasBar = amVal != null || mdVal != null || pmVal != null;
  let out = '';
  if (hasBar) {
    out += '<div class="info-section-title" style="margin-top:0">Service Level</div>';
    out += '<div class="sl-bar">'
      + slBarSeg('AM', amVal > 997 ? null : amVal)
      + slBarSeg('MD', mdVal > 997 ? null : mdVal)
      + slBarSeg('PM', pmVal > 997 ? null : pmVal)
      + '</div>';
  }
  const trow = attrs.TransitROW;
  if (trow != null) {
    out += `<div class="info-row"><span class="info-key">Transit ROW</span><span class="info-val">${DOMAINS.TransitROW[trow] ?? trow}</span></div>`;
  }
  return out;
}

function showInfoPanel(gid, segmentName, attrs, transitRows, routeLookup) {
  // Format: "Segment {gid} - {SegmentName}" or just "Segment {gid}"
  let title = gid != null ? `Segment ${gid}` : 'Segment —';
  if (segmentName) title += ` - ${segmentName}`;
  $('infoPanelTitle').textContent = title;
  
  let html = renderAttrs(attrs);

  if (transitRows == null) {
    html += '<div class="info-section-title">Transit Routes</div>';
    html += '<div class="loading-routes">Loading routes…</div>';
  } else if (transitRows.length) {
    const unique = new Set(transitRows.map(r => r.attributes.Route)).size;
    html += `<div class="info-section-title">Transit Routes (${unique})</div><div class="transit-cards">`;
    const groups = {};
    transitRows.forEach(r => {
      const a = r.attributes;
      const slKey = a.ServiceLevel != null ? normalizeSL(a.ServiceLevel) : '__null__';
      if (!groups[slKey]) groups[slKey] = [];
      groups[slKey].push(a);
    });
    Object.keys(groups).sort((a,b) => a==='__null__'?1:b==='__null__'?-1:Number(a)-Number(b)).forEach(slKey => {
      const src = SL_META[Number(slKey)];
      const pillStyle = src ? `background:${src.bg};color:${src.text}` : 'background:var(--panel2);color:var(--muted)';
      const slLabel = slKey === '__null__' ? 'Unknown' : (DOMAINS.ServiceLevel_v2[Number(slKey)] ?? slKey);
      html += `<div class="transit-group-label"><span class="tgl-pill" style="${pillStyle}">${slLabel}</span><span class="tgl-line"></span></div>`;
      const seen = new Set();
      html += '<div class="transit-card"><div style="display:flex;flex-wrap:wrap;gap:5px;">';
      groups[slKey].filter(a => { const k=a.Route; return !seen.has(k)&&seen.add(k); }).forEach(a => {
        const info = routeLookup[a.Segment_RouteBound] ?? {};
        const ac   = AGENCY_COLORS[info.agency] ?? { bg:'#2a3a52', text:'#dce8f5' };
        const badgeBg = info.Color_RouteBadge ?? ac.bg;
        const badgeTx = info.Color_RouteText  ?? ac.text;
        const agFull  = DOMAINS.Agency[info.agency] ?? info.agency ?? '';
        html += `<span class="route-badge" style="background:${badgeBg};color:${badgeTx}" data-agency="${agFull}">${info.short ?? a.Route}</span>`;
      });
      html += '</div></div>';
    });
    html += '</div>';
  }

  $('infoContent').innerHTML = html;
  $('infoPanel').classList.add('visible');
  // On mobile, swap sidebar out and panel in
  if (window.matchMedia('(max-width: 768px)').matches) {
    $('sidebar').classList.add('hidden-mobile');
  }
}

// Desktop close — just hide the panel
$('closeInfo').addEventListener('click', () => $('infoPanel').classList.remove('visible'));

// Mobile back — hide panel, restore sidebar
$('backBtn').addEventListener('click', () => {
  $('infoPanel').classList.remove('visible');
  $('sidebar').classList.remove('hidden-mobile');
});

// ── Legend builder (identical to original) ────────────────────────────────────
function buildLegend(mode) {
  const container = $('legendList');
  container.innerHTML = '';

  if (mode === 'trolley') {
    [[1,'#00CFFF','Active'],[2,'#3A7CA5','Active – No scheduled service'],[3,'#FFAA00','Under Construction'],[4,'#5588AA','Planned']].forEach(([,c,l]) => {
      const d = document.createElement('div'); d.className = 'legend-item';
      d.innerHTML = `<div class="legend-swatch" style="background:${c}"></div><div class="legend-label">${l}</div>`;
      container.appendChild(d);
    });
    return;
  }
  if (mode === 'row') {
    [[7,'#CC88FF'],[6,'#00FFCC'],[5,'#00AAAA'],[4,'#00CC66'],[2,'#FFD700'],[3,'#FF8C00'],[9,'#FF6600'],[10,'#FF6600']].forEach(([code,c]) => {
      const d = document.createElement('div'); d.className = 'legend-item';
      d.innerHTML = `<div class="legend-swatch" style="background:${c}"></div><div class="legend-label">${DOMAINS.TransitROW[code] ?? code}</div>`;
      container.appendChild(d);
    });
    return;
  }
  SL2_DRAW_ORDER.forEach(code => {
    const src = SL_META[code]; if (!src) return;
    const d = document.createElement('div'); d.className = 'legend-item';
    d.innerHTML = `<div class="legend-swatch" style="background:${src.bg}"></div><div class="legend-label">${DOMAINS.ServiceLevel_v2[code] ?? code}</div>`;
    container.appendChild(d);
  });
}

// ── ArcGIS SDK modules ────────────────────────────────────────────────────────
require([
  "esri/Map",
  "esri/views/MapView",
  "esri/layers/FeatureLayer",
  "esri/symbols/CIMSymbol",
  "esri/renderers/UniqueValueRenderer",
  "esri/renderers/SimpleRenderer",
  "esri/core/reactiveUtils"
], function(
  Map, MapView, FeatureLayer,
  CIMSymbol, UniqueValueRenderer, SimpleRenderer,
  reactiveUtils
) {

  // ── Single layer configuration ─────────────────────────────────────────────
  // One consolidated layer with all attributes. Mode switching is done by
  // swapping renderers client-side rather than toggling layer visibility.
  const LAYER_ID = 2;
  let mainLayers = [];  // Array of layers instead of single layer
  let layerViews = [];  // Array of layerViews for highlights

  // ── Renderer builders ──────────────────────────────────────────────────────
  // Each mode needs its own renderer. We build these client-side since the
  // service only provides simple symbols (no CIM offset preservation).

  // Service Level: CIM symbols with offset for visual separation
  function buildSLCIMRenderer(field, offset) {
    function makeCIMSym(hexColor, width, offsetPt) {
      const [r, g, b] = [
        parseInt(hexColor.slice(1,3), 16),
        parseInt(hexColor.slice(3,5), 16),
        parseInt(hexColor.slice(5,7), 16)
      ];
      return new CIMSymbol({
        data: {
          type: 'CIMSymbolReference',
          symbol: {
            type: 'CIMLineSymbol',
            symbolLayers: [{
              type: 'CIMSolidStroke',
              width: width,
              color: [r, g, b, 230],
              capStyle: 'Round',
              joinStyle: 'Round',
              effects: [{
                type: 'CIMGeometricEffectOffset',
                offset: offsetPt,
                method: 'Rounded',
                option: 0
              }]
            }]
          }
        }
      });
    }

    const defaultSym = makeCIMSym('#A0A0A0', 0.8, offset);

    return new UniqueValueRenderer({
      field: field,
      defaultSymbol: defaultSym,
      uniqueValueInfos: SL1_DRAW_ORDER.slice().reverse().map(code => ({
        value: String(code),
        label: DOMAINS.ServiceLevel_v2[code] || String(code),
        symbol: makeCIMSym(SL_META[code].bg, 2, offset)
      }))
    });
  }

  // Trolleybus Network: Symbolize on Electrified field
  function buildTrolleyRenderer(offset) {
    const TROLLEY_COLORS = {
      0: '#666666',  // Inactive
      1: '#FFD700',  // Active
      2: '#FFA500',  // Active - No scheduled service
      3: '#FF6B6B',  // Under Construction
      4: '#9B59B6'   // Planned
    };
	function makeTrolleyCIMSym(hexColor, width, offsetPt) {
		const [r, g, b] = [
		  parseInt(hexColor.slice(1,3), 16),
		  parseInt(hexColor.slice(3,5), 16),
		  parseInt(hexColor.slice(5,7), 16)
		];
		return new CIMSymbol({
		  data: {
			type: 'CIMSymbolReference',
			symbol: {
			  type: 'CIMLineSymbol',
			  symbolLayers: [{
				type: 'CIMSolidStroke',
				width: width,
				color: [r, g, b, 230],
				capStyle: 'Round',
				joinStyle: 'Round',
				effects: [{
				  type: 'CIMGeometricEffectOffset',
				  offset: offsetPt,
				  method: 'Rounded',
				  option: 0
				}]
			  }]
			}
		  }
		});
	}

    return new UniqueValueRenderer({
    field: 'Electrified',
    defaultSymbol: makeTrolleyCIMSym('#666666', 1.5, offset),
    // Reverse array so first item in DRAW_ORDER.TROLLEY draws on top (last)
    uniqueValueInfos: DRAW_ORDER.TROLLEY.slice().reverse().map(code => ({
      value: String(code),
      label: DOMAINS.TrolleyWire[code] || String(code),
      symbol: makeTrolleyCIMSym(TROLLEY_COLORS[code], 1.8, offset)
      }))
    });
  }

  // Transit Right-of-Way: Symbolize on TransitROW field
  function buildROWRenderer(offset) {
	const ROW_COLORS = {
	  1: '#888888',  // None
	  2: '#56B4E9',  // Time Restricted Bus-only
	  3: '#E69F00',  // Managed Lane (HOV/Toll)
	  4: '#009E73',  // All-day Transit-Only
	  5: '#F0E442',  // Freight and Bus
	  6: '#0072B2',  // Dedicated Transit Only
	  7: '#D55E00',  // Grade-Separated Light Rail
	  9: '#CC79A7',  // Bus Lane Under Construction
	 10: '#CC79A7'   // Bus Lane Planned
	};
	function makeROWCIMSym(hexColor, width, offsetPt) {
		const [r, g, b] = [
		  parseInt(hexColor.slice(1,3), 16),
		  parseInt(hexColor.slice(3,5), 16),
		  parseInt(hexColor.slice(5,7), 16)
		];
		return new CIMSymbol({
		  data: {
			type: 'CIMSymbolReference',
			symbol: {
			  type: 'CIMLineSymbol',
			  symbolLayers: [{
				type: 'CIMSolidStroke',
				width: width,
				color: [r, g, b, 230],
				capStyle: 'Round',
				joinStyle: 'Round',
				effects: [{
				  type: 'CIMGeometricEffectOffset',
				  offset: offsetPt,
				  method: 'Rounded',
				  option: 0
				}]
			  }]
			}
		  }
		});
	  }
		return new UniqueValueRenderer({
		field: 'TransitROW',
		defaultSymbol: makeROWCIMSym('#888888', 1.5, offset),
		// Reverse array so first item in DRAW_ORDER.BUSLANE draws on top (last)
		uniqueValueInfos: DRAW_ORDER.BUSLANE.slice().reverse().map(code => ({
		  value: String(code),
		  label: DOMAINS.TransitROW[code] || String(code),
		  symbol: makeROWCIMSym(ROW_COLORS[code], 1.8, offset)
		}))
	  });
	}

  // Highlight symbol used by view.hitTest hover
  const HIGHLIGHT_OPTIONS = { color: [255,255,255], fillOpacity: 0, haloOpacity: 0.9, haloColor: [255,255,255] };

  // ── State ──────────────────────────────────────────────────────────────────
  let activePeriod  = 'ServiceLevel';
  let displayMode   = 'sl';
  let highlights    = [];           // active highlight handles
  let routeLookup   = {};           // Route_Bound → { agency, short, Color_RouteBadge, Color_RouteText }
  let transitLayer  = null;         // FeatureLayer for Transit_Table (no geometry, query-only)

  // ── Map + View ─────────────────────────────────────────────────────────────
  // ✦ ArcGIS: Map + MapView replace L.map() + L.tileLayer().
  //   basemap:'satellite' is the exact same Esri World Imagery tiles — no URL needed.
  const map = new Map({ basemap: 'satellite' });
  const view = new MapView({
    container: 'viewDiv',
    map: map,
    center: [-122.3321, 47.6062],
    zoom: 13,
    // ✦ ArcGIS: Highlight options are view-level, not per-layer
    highlightOptions: HIGHLIGHT_OPTIONS,
    // ✦ ArcGIS: Popup disabled — we use our own custom info panel
    popup: { autoOpenEnabled: false },
    ui: { components: ['zoom'] }
  });

  // ── Hover highlight ────────────────────────────────────────────────────────
  // ✦ ArcGIS: view.hitTest() replaces onEachFeature mouseover/mouseout.
  //   One listener handles ALL layers at once — no per-feature wiring.
  view.on('pointer-move', async e => {
    if (!mainLayers.length || !layerViews.length) return;
    const result = await view.hitTest(e, { include: mainLayers });
    highlights.forEach(h => h.remove());
    highlights = [];
    if (result.results.length) {
      const graphic = result.results[0].graphic;
      const layer = graphic.layer;
      const layerViewIndex = mainLayers.indexOf(layer);
      if (layerViewIndex >= 0 && layerViews[layerViewIndex]) {
        highlights.push(layerViews[layerViewIndex].highlight(graphic));
      }
    }
  });

  // ── Click → info panel ─────────────────────────────────────────────────────
  view.on('click', async e => {
    const result = await view.hitTest(e, { include: mainLayers });
    if (!result.results.length) return;

    const graphic    = result.results[0].graphic;
    const attrs      = graphic.attributes;

    const gid = attrs.GeoID ?? attrs.geoid ?? attrs.GEOID ?? null;

    const segmentName = attrs.SegmentName || attrs.Segment_Name || null;

    // Show panel immediately with route section as "loading"
    showInfoPanel(gid, segmentName, attrs, null, routeLookup);

    // Query transit table for routes on this segment
    if (transitLayer && gid != null) {
      try {
        const q = transitLayer.createQuery();
        const _t = getTodayStr();
        q.where = `GeoID = ${gid} AND ` +
                  `(StartDate IS NULL OR StartDate <= DATE '${_t}') AND ` +
                  `(EndDate   IS NULL OR EndDate   >= DATE '${_t}')`;
        q.outFields = ['Route', 'ServiceLevel', 'Segment_RouteBound'];
        q.returnGeometry = false;
        const result2 = await transitLayer.queryFeatures(q);
        showInfoPanel(gid, segmentName, attrs, result2.features, routeLookup);
      } catch(err) {
        console.error('Transit query failed:', err);
        showInfoPanel(gid, segmentName, attrs, [], routeLookup);
      }
    } else {
      showInfoPanel(gid, segmentName, attrs, [], routeLookup);
    }
  });

  // ── Period switcher ────────────────────────────────────────────────────────
  document.getElementById('periodSwitcher').addEventListener('click', e => {
    const btn = e.target.closest('.period-btn');
    if (!btn) return;
    activePeriod = btn.dataset.period;
    document.querySelectorAll('.period-btn').forEach(b => b.classList.toggle('active', b === btn));
    // Rebuild CIM renderer with new period field (only affects SL mode)
    if (mainLayers.length && displayMode === 'sl') {
	  mainLayers.forEach((layer, i) => {
        const code = SL1_DRAW_ORDER[SL1_DRAW_ORDER.length - 1 - i];
        layer.definitionExpression = `${DEF_EXPR_DATE('Segment_StartDate', 'Segment_EndDate')} AND ${activePeriod} = ${code}`;
      });
    }
  });

  // ── Mode switcher ──────────────────────────────────────────────────────────
  document.getElementById('modeSwitcher').addEventListener('click', e => {
    const btn = e.target.closest('.mode-btn');
    if (!btn) return;
    displayMode = btn.dataset.mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b === btn));
    $('periodSwitcher').style.display = displayMode === 'sl' ? 'flex' : 'none';

    buildLegend(displayMode);

    // Rebuild layers based on mode
	if (!mainLayers.length) return;
		
	// Remove existing layers
	mainLayers.forEach(layer => map.remove(layer));
	mainLayers = [];
	layerViews = [];

	switch(displayMode) {
	  case 'sl':
		// Create Service Level layers
		mainLayers = SL1_DRAW_ORDER.slice().reverse().map(code => {
		  return new FeatureLayer({
			url: `${BASE}/${LAYER_ID}`,
			title: `Transit SL ${code}`,
			definitionExpression: `${DEF_EXPR_DATE('Segment_StartDate', 'Segment_EndDate')} AND ${activePeriod} = ${code}`,
			outFields: ['*'],
			popupEnabled: false,
			renderer: new SimpleRenderer({
			  symbol: (() => {
				const hexColor = SL_META[code]?.bg || '#A0A0A0';
				const width = SL_META[code] ? 2 : 0.8;
				const [r, g, b] = [
				  parseInt(hexColor.slice(1,3), 16),
				  parseInt(hexColor.slice(3,5), 16),
				  parseInt(hexColor.slice(5,7), 16)
				];
				return new CIMSymbol({
				  data: {
					type: 'CIMSymbolReference',
					symbol: {
					  type: 'CIMLineSymbol',
					  symbolLayers: [{
						type: 'CIMSolidStroke',
						width: width,
						color: [r, g, b, 230],
						capStyle: 'Round',
						joinStyle: 'Round',
						effects: [{
						  type: 'CIMGeometricEffectOffset',
						  offset: -1.1,
						  method: 'Rounded',
						  option: 0
						}]
					  }]
					}
				  }
				});
			  })()
			})
		  });
		});
		break;
		
	  case 'trolley':
		// Create Trolley layers
		mainLayers = DRAW_ORDER.TROLLEY.slice().reverse().map(code => {
		  return new FeatureLayer({
			url: `${BASE}/${LAYER_ID}`,
			title: `Trolley ${code}`,
			definitionExpression: `${DEF_EXPR_DATE('Segment_StartDate', 'Segment_EndDate')} AND Electrified = ${code}`,
			outFields: ['*'],
			popupEnabled: false,
			renderer: buildTrolleyRenderer(-1)  // This won't work - need single symbol
		  });
		});
		break;
		
	  case 'row':
		// Create ROW layers
		mainLayers = DRAW_ORDER.BUSLANE.slice().reverse().map(code => {
		  return new FeatureLayer({
			url: `${BASE}/${LAYER_ID}`,
			title: `ROW ${code}`,
			definitionExpression: `${DEF_EXPR_DATE('Segment_StartDate', 'Segment_EndDate')} AND TransitROW = ${code}`,
			outFields: ['*'],
			popupEnabled: false,
			renderer: buildROWRenderer(-1)  // This won't work - need single symbol
		  });
		});
		break;
	}

	// Add new layers
	mainLayers.forEach(layer => map.add(layer));

	// Re-register layerViews
	(async () => {
	  for (const layer of mainLayers) {
		const lv = await view.whenLayerView(layer);
		layerViews.push(lv);
	  }
	})();
  });

  // ── Main init ──────────────────────────────────────────────────────────────
  async function init() {
    try {
      setStatus('loading', 'Connecting…');

      // Discover layers from FeatureServer metadata (same as original)
      const meta = await (await fetch(`${BASE}?f=json`)).json();
      if (meta.error) throw new Error(meta.error.message);

      const transitTables  = (meta.tables  || []).filter(l => /transit_table$/i.test(l.name));
      const routeAttrTables= (meta.tables  || []).filter(l => /routeatt/i.test(l.name));

      // ── Build RouteAttribute lookup (same logic, but use FeatureLayer.queryFeatures) ──
      // ✦ ArcGIS: queryFeatures() handles pagination automatically — no fetchAll() needed
      if (routeAttrTables.length) {
        const raLayer = new FeatureLayer({ url: `${BASE}/${routeAttrTables[0].id}` });
        const raResult = await raLayer.queryFeatures({
          where: '1=1',
          outFields: ['Route_Bound','RouteColor','TextColor','Agency','RouteShort'],
          returnGeometry: false
        });
        raResult.features.forEach(f => {
          const a = f.attributes;
          if (a.Route_Bound == null) return;
          routeLookup[a.Route_Bound] = {
            agency: a.Agency, short: a.RouteShort,
            Color_RouteBadge: a.RouteColor ? '#' + a.RouteColor : null,
            Color_RouteText:  a.TextColor  ? '#' + a.TextColor  : null
          };
        });
      }

      // ── Transit table layer (query-only, no geometry) ─────────────────────
      // ✦ ArcGIS: definitionExpression is applied server-side and automatically
      //   ANDed with any where clause passed to queryFeatures(). The click handler's
      //   `where: GeoID = ${gid}` will only ever see rows active today with a valid
      //   service level — no need to repeat the date logic at query time.
      if (transitTables.length) {
        transitLayer = new FeatureLayer({
          url: `${BASE}/${transitTables[0].id}`,
          definitionExpression: DEF_EXPR_DATE('StartDate', 'EndDate')
        });
        // ✦ ArcGIS: transitLayer is never added to the map (query-only), so the
        //   SDK won't load it automatically. Without load(), createQuery() returns
        //   where:'1=1' and the definitionExpression is silently ignored.
        await transitLayer.load();
      }

      // ── Create single consolidated FeatureLayer ───────────────────────────────
      // One layer with all attributes. Renderers are swapped client-side for
      // different viewing modes rather than maintaining separate layers.
      // Create separate layer for each service level (bottom to top)
	  mainLayers = SL1_DRAW_ORDER.slice().reverse().map(code => {
	    return new FeatureLayer({
	  	  url: `${BASE}/${LAYER_ID}`,
	  	  title: `Transit SL ${code}`,
	  	  definitionExpression: `${DEF_EXPR_DATE('Segment_StartDate', 'Segment_EndDate')} AND ${activePeriod} = ${code}`,
	  	  outFields: ['*'],
	  	  popupEnabled: false,
	  	  renderer: new SimpleRenderer({
	  	    symbol: (() => {
			  const hexColor = SL_META[code]?.bg || '#A0A0A0';
			  const width = SL_META[code] ? 2 : 0.8;
			  const [r, g, b] = [
			    parseInt(hexColor.slice(1,3), 16),
			    parseInt(hexColor.slice(3,5), 16),
			    parseInt(hexColor.slice(5,7), 16)
			  ];
			  return new CIMSymbol({
			    data: {
				  type: 'CIMSymbolReference',
				  symbol: {
				    type: 'CIMLineSymbol',
				    symbolLayers: [{
					  type: 'CIMSolidStroke',
					  width: width,
					  color: [r, g, b, 230],
					  capStyle: 'Round',
					  joinStyle: 'Round',
					  effects: [{
					    type: 'CIMGeometricEffectOffset',
					    offset: -1.2,
					    method: 'Rounded',
					    option: 0
					  }]
				    }]
				  }
			    }
			  });
		    })()
		  })
	    });
	  });

	  // Add layers in order (first = bottom, last = top)
	  mainLayers.forEach(layer => map.add(layer));

      // Register all layerViews
	  for (const layer of mainLayers) {
        const lv = await view.whenLayerView(layer);
        layerViews.push(lv);
      }
	  
      // ── Watch for layer to finish loading ─────────────────────────────────────
      await reactiveUtils.whenOnce(() => !view.updating);
      setStatus('', 'Loaded');
      const dot = $('statusPill').querySelector('.dot');
      if (dot) dot.style.animation = 'none';

      buildLegend('sl');

      // Start the midnight refresh cycle
      scheduleMidnightRefresh(
        () => mainLayers,
        () => transitLayer
      );

    } catch(err) {
      setStatus('error', 'Load failed');
      $('legendList').innerHTML = `<div style="padding:16px;color:var(--red);font-size:12px">${err.message}</div>`;
      console.error(err);
    }
  }

  init();

  // ── Resizer drag logic ──────────────────────────────────────────────────────
  (function() {
    const resizer = document.getElementById('resizer');
    const sidebar = document.getElementById('sidebar');
    const MOBILE  = () => window.matchMedia('(max-width: 768px)').matches;
    const DEFAULT_W = 290, DEFAULT_H = 280;
    const MIN_W = 160, MAX_W = 540;
    const MIN_H = 120, MAX_H_RATIO = 0.65; // max 65% of viewport height on mobile

    let dragging = false;

    function startDrag(e) {
      dragging = true;
      resizer.classList.add('dragging');
      document.body.style.cursor    = MOBILE() ? 'row-resize' : 'col-resize';
      document.body.style.userSelect = 'none';
      document.addEventListener('mousemove', onDrag);
      document.addEventListener('touchmove', onDrag, { passive: false });
      document.addEventListener('mouseup',   stopDrag);
      document.addEventListener('touchend',  stopDrag);
    }

    function onDrag(e) {
      if (!dragging) return;
      if (e.cancelable) e.preventDefault(); // prevent scroll on touch

      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;

      if (MOBILE()) {
        // Drag up = taller sidebar. clientY measured from top of viewport.
        const mainBottom = document.querySelector('.main').getBoundingClientRect().bottom;
        const newH = Math.round(mainBottom - clientY);
        const maxH = Math.round(window.innerHeight * MAX_H_RATIO);
        sidebar.style.height = Math.min(Math.max(newH, MIN_H), maxH) + 'px';
        // Keep info panel height in sync when it's the one showing
        const panel = document.getElementById('infoPanel');
        if (panel.classList.contains('visible')) panel.style.height = sidebar.style.height;
      } else {
        // Drag right = wider sidebar.
        const mainLeft = document.querySelector('.main').getBoundingClientRect().left;
        const newW = Math.round(clientX - mainLeft);
        sidebar.style.width = Math.min(Math.max(newW, MIN_W), MAX_W) + 'px';
      }
    }

    function stopDrag() {
      dragging = false;
      resizer.classList.remove('dragging');
      document.body.style.cursor     = '';
      document.body.style.userSelect = '';
      document.removeEventListener('mousemove', onDrag);
      document.removeEventListener('touchmove', onDrag);
      document.removeEventListener('mouseup',   stopDrag);
      document.removeEventListener('touchend',  stopDrag);
    }

    // Double-click resets to default size
    resizer.addEventListener('dblclick', () => {
      if (MOBILE()) {
        sidebar.style.height = DEFAULT_H + 'px';
        const panel = document.getElementById('infoPanel');
        if (panel.classList.contains('visible')) panel.style.height = DEFAULT_H + 'px';
      } else {
        sidebar.style.width = DEFAULT_W + 'px';
      }
    });

    resizer.addEventListener('mousedown', startDrag);
    resizer.addEventListener('touchstart', startDrag, { passive: true });
  })();

}); // end require()
</script>
